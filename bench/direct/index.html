<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Direct GA — Layout Evolution</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --dim: #8b949e; --blue: #58a6ff; --green: #3fb950; --red: #f85149; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 14px; color: var(--blue); }
#status { font-size: 12px; color: var(--dim); }
#fixture-info { margin-left: auto; font-size: 12px; color: var(--dim); }

#dashboard { display: flex; gap: 12px; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
#chart { flex: 1; min-width: 0; }
#chart svg { width: 100%; height: 100%; }
#stats { width: 160px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
.stat .label { font-size: 10px; color: #484f58; text-transform: uppercase; }
.stat .value { font-size: 16px; font-weight: 600; color: var(--green); }

main { flex: 1; display: flex; align-items: stretch; justify-content: center; padding: 8px 12px; gap: 12px; min-height: 0; overflow: hidden; }
.candidate { flex: 1; background: var(--card); border: 2px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.candidate h3 { font-size: 12px; color: var(--dim); margin-bottom: 6px; flex-shrink: 0; }
.candidate svg { width: 100%; height: 100%; flex: 1; min-height: 0; }
.vs { font-size: 18px; font-weight: 700; color: var(--red); }

nav { padding: 6px 16px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 6px; justify-content: center; }
button { padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 12px; }
button:hover { border-color: var(--blue); }
button:active { background: var(--blue); color: var(--bg); }
</style>
</head>
<body>
<header>
  <h1>DIRECT GA</h1>
  <div id="status">Loading...</div>
  <div id="fixture-info"></div>
</header>

<div id="dashboard">
  <div id="chart"></div>
  <div id="stats">
    <div class="stat"><div class="label">Generation</div><div class="value" id="gen">0</div></div>
    <div class="stat"><div class="label">Best Score</div><div class="value" id="best-score">—</div></div>
    <div class="stat"><div class="label">Crossings</div><div class="value" id="crossings">—</div></div>
    <div class="stat"><div class="label">Votes</div><div class="value" id="vote-count">0</div></div>
  </div>
</div>

<main>
  <div class="candidate" id="left"><h3>BEST</h3></div>
  <div class="vs">vs</div>
  <div class="candidate" id="right"><h3>CHALLENGER</h3></div>
</main>

<nav>
  <button onclick="vote('left')">← Left</button>
  <button onclick="vote('tie')">= Tie</button>
  <button onclick="vote('right')">Right →</button>
  <button onclick="prevFixture()">← Prev</button>
  <button onclick="nextFixture()">Next →</button>
</nav>

<script>
async function load() {
  try {
    const r = await fetch('/state');
    const s = await r.json();

    document.getElementById('status').textContent = s.running ? `EVOLVING ${s.generation}/${s.totalGens||'?'}` : `DONE gen ${s.generation}`;
    document.getElementById('status').style.color = s.running ? '#3fb950' : '#8b949e';
    document.getElementById('fixture-info').textContent = `${s.fixture} (${s.fixtureCount} graphs)`;
    document.getElementById('gen').textContent = s.generation;
    document.getElementById('best-score').textContent = s.bestScore?.toFixed(0) ?? '—';
    document.getElementById('crossings').textContent = s.bestTerms?.crossings ?? '—';
    document.getElementById('vote-count').textContent = s.votes;

    if (s.leftSvg) document.querySelector('#left').innerHTML = '<h3>BEST (' + (s.leftScore?.toFixed(0)||'?') + ')</h3>' + s.leftSvg;
    if (s.rightSvg) document.querySelector('#right').innerHTML = '<h3>CHALLENGER (' + (s.rightScore?.toFixed(0)||'?') + ')</h3>' + s.rightSvg;

    // Chart
    if (s.history && s.history.length > 1) {
      const pts = s.history;
      let maxS = -Infinity, minS = Infinity;
      for (const p of pts) { if (p.score > maxS) maxS = p.score; if (p.score < minS) minS = p.score; }
      const range = maxS - minS || 1;
      minS -= range * 0.05; maxS += range * 0.05;
      const w = 600, h = 120, pad = 40;
      const pw = w - pad * 2, ph = h - 40;
      const sx = g => pad + (g / Math.max(pts[pts.length-1].gen, 1)) * pw;
      const sy = v => 20 + ph - ((v - minS) / (maxS - minS)) * ph;

      let svg = '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">';
      svg += '<rect width="'+w+'" height="'+h+'" fill="#0d1117" rx="6"/>';
      svg += '<text x="'+pad+'" y="14" fill="#8b949e" font-size="10" font-family="sans-serif">Fitness (lower = better)</text>';
      // Grid
      for (let i = 0; i <= 3; i++) {
        const gy = 20 + (i/3) * ph;
        const val = maxS - (i/3)*(maxS-minS);
        svg += '<line x1="'+pad+'" y1="'+gy+'" x2="'+(w-pad)+'" y2="'+gy+'" stroke="#21262d" stroke-width="0.5"/>';
        svg += '<text x="'+(pad-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#484f58" font-size="8" font-family="sans-serif">'+(val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0))+'</text>';
      }
      // Line
      const d = pts.filter((_,i) => i % Math.max(1, Math.floor(pts.length/150)) === 0 || i === pts.length-1)
        .map((p,i) => (i===0?'M':'L')+' '+sx(p.gen).toFixed(1)+' '+sy(p.score).toFixed(1)).join(' ');
      svg += '<path d="'+d+'" fill="none" stroke="#3fb950" stroke-width="2"/>';
      const last = pts[pts.length-1];
      svg += '<circle cx="'+sx(last.gen).toFixed(1)+'" cy="'+sy(last.score).toFixed(1)+'" r="3" fill="#3fb950"/>';
      svg += '<text x="'+(w/2)+'" y="'+(h-4)+'" text-anchor="middle" fill="#484f58" font-size="9" font-family="sans-serif">generation</text>';
      svg += '</svg>';
      document.getElementById('chart').innerHTML = svg;
    }
  } catch(e) { console.error(e); }
}

async function vote(choice) {
  await fetch('/vote', { method: 'POST', body: JSON.stringify({ choice }) });
  load();
}

async function nextFixture() {
  await fetch('/next-fixture');
  load();
}

async function prevFixture() {
  await fetch('/prev-fixture');
  load();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') vote('left');
  if (e.key === 'ArrowRight') vote('right');
  if (e.key === 'ArrowDown') vote('tie');
  if (e.key === 'n') nextFixture();
  if (e.key === 'p') prevFixture();
});

load();
setInterval(load, 800);
</script>
</body>
</html>
