<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dag-map Layout Evolution</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="header">
    <h1>DAG-MAP EVOLUTION</h1>
    <div id="status">Loading...</div>
    <div id="fixture-bar">
      <label for="fixture-select">Fixture:</label>
      <select id="fixture-select"></select>
      <button id="btn-shuffle">🔀 ON</button>
    </div>
  </header>

  <div id="dashboard">
    <div id="convergence-chart"></div>
    <div id="stats-panel">
      <div class="stat-card">
        <div class="label">Generation</div>
        <div class="value neutral" id="stat-gen">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Votes</div>
        <div class="value neutral" id="stat-votes">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Best Fitness</div>
        <div class="value good" id="stat-best">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Since Refit</div>
        <div class="value neutral" id="stat-refit">0</div>
      </div>
    </div>
  </div>

  <main id="arena">
    <div id="no-pair" class="hidden">
      Waiting for next generation...
    </div>
    <div id="pair" class="hidden">
      <div class="candidate" id="left-candidate">
        <div class="label" id="left-label"></div>
        <div class="strategy-info" id="left-strategy"></div>
        <div class="svg-container" id="left-svg"></div>
      </div>
      <div class="vs">vs</div>
      <div class="candidate" id="right-candidate">
        <div class="label" id="right-label"></div>
        <div class="strategy-info" id="right-strategy"></div>
        <div class="svg-container" id="right-svg"></div>
      </div>
    </div>
  </main>

  <nav id="controls">
    <div id="vote-buttons">
      <button id="btn-left" title="Left wins (←)">← Left</button>
      <button id="btn-tie" title="Tie (↓)">= Tie</button>
      <button id="btn-skip" title="Skip (Space)">⏭ Skip</button>
      <button id="btn-right" title="Right wins (→)">Right →</button>
    </div>
    <div id="control-buttons">
      <button id="btn-pause">⏸ Pause</button>
      <button id="btn-protect-left" title="Protect left">🛡L</button>
      <button id="btn-protect-right" title="Protect right">🛡R</button>
      <button id="btn-kill-left" title="Kill left">☠L</button>
      <button id="btn-kill-right" title="Kill right">☠R</button>
    </div>
  </nav>

  <footer id="footer">
    <span id="run-info"></span>
    <span id="weights-info"></span>
  </footer>

  <script type="module" src="/static/app.mjs"></script>
</body>
</html>
