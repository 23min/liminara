<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tinder UI — dag-map bench</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="header">
    <h1>dag-map Tinder</h1>
    <div id="status">Loading...</div>
  </header>

  <main id="arena">
    <div id="no-pair" class="hidden">
      No pair available — waiting for next generation.
    </div>

    <div id="pair" class="hidden">
      <div class="candidate" id="left-candidate">
        <div class="label" id="left-label"></div>
        <div class="svg-container" id="left-svg"></div>
      </div>
      <div class="vs">vs</div>
      <div class="candidate" id="right-candidate">
        <div class="label" id="right-label"></div>
        <div class="svg-container" id="right-svg"></div>
      </div>
    </div>
  </main>

  <nav id="controls">
    <div id="vote-buttons">
      <button id="btn-left" title="Left wins (←)">← Left</button>
      <button id="btn-tie" title="Tie (↓)">↓ Tie</button>
      <button id="btn-skip" title="Skip (Space)">⎵ Skip</button>
      <button id="btn-right" title="Right wins (→)">Right →</button>
    </div>
    <div id="control-buttons">
      <button id="btn-pause">Pause</button>
      <button id="btn-protect-left" title="Protect left individual">Protect L</button>
      <button id="btn-protect-right" title="Protect right individual">Protect R</button>
      <button id="btn-kill-left" title="Kill left individual">Kill L</button>
      <button id="btn-kill-right" title="Kill right individual">Kill R</button>
    </div>
  </nav>

  <footer id="footer">
    <span id="run-info"></span>
    <span id="vote-info"></span>
    <span id="weights-info"></span>
  </footer>

  <script type="module" src="/static/app.mjs"></script>
</body>
</html>
