<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <metadata>Archived historical visualization asset. truth_class: historical. archived_on: 2026-04-04. superseded_by: work/done/E-09-observation-layer/M-OBS-03-dag-visualization.md; runtime/apps/liminara_web/.</metadata>
  <defs>
    <filter id="sw">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="2" result="turb" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1"/>
    </filter>
  </defs>

  <rect width="960" height="560" fill="#F5F0E8"/>

  <text x="32" y="28" font-size="11" fill="#2C2C2C" letter-spacing="0.08em">THE SCORE — RADAR PACK DAILY BRIEFING</text>
  <text x="32" y="42" font-size="8" fill="#8C8680">A musical score for computation. Time flows left to right. Each lane is a staff. Ops are notes.</text>
  <line x1="32" y1="50" x2="928" y2="50" stroke="#2C2C2C" stroke-width="0.5" opacity="0.2"/>

  <!-- Time ruler at top -->
  <line x1="100" y1="68" x2="920" y2="68" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="100" y="64" font-size="7" fill="#8C8680">0s</text>
  <line x1="100" y1="66" x2="100" y2="70" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="200" y="64" font-size="7" fill="#8C8680">1s</text>
  <line x1="200" y1="66" x2="200" y2="70" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="300" y="64" font-size="7" fill="#8C8680">2s</text>
  <line x1="300" y1="66" x2="300" y2="70" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="440" y="64" font-size="7" fill="#8C8680">5s</text>
  <line x1="440" y1="66" x2="440" y2="70" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="680" y="64" font-size="7" fill="#8C8680">12s</text>
  <line x1="680" y1="66" x2="680" y2="70" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="860" y="64" font-size="7" fill="#8C8680">18s</text>
  <line x1="860" y1="66" x2="860" y2="70" stroke="#D4CFC7" stroke-width="0.4"/>

  <!-- ==================== -->
  <!-- STAFF 1: FETCH (I/O) -->
  <!-- ==================== -->

  <!-- Staff label / "clef" -->
  <text x="36" y="118" font-size="9" fill="#D4944C" font-weight="500">I/O</text>
  <text x="36" y="130" font-size="7" fill="#8C8680">fetch</text>

  <!-- Five staff lines -->
  <line x1="80" y1="100" x2="920" y2="100" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="110" x2="920" y2="110" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="120" x2="920" y2="120" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="130" x2="920" y2="130" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="140" x2="920" y2="140" stroke="#D4CFC7" stroke-width="0.25"/>

  <!-- Bar line at start -->
  <line x1="90" y1="100" x2="90" y2="140" stroke="#D4CFC7" stroke-width="0.5"/>

  <!-- Note: fetch_dn — sustained note (1.2s duration, wider oval) -->
  <!-- Stem + notehead (amber) -->
  <ellipse cx="120" cy="110" rx="18" ry="6" fill="#D4944C" transform="rotate(-8, 120, 110)"/>
  <line x1="138" y1="110" x2="138" y2="82" stroke="#D4944C" stroke-width="1"/>
  <!-- Flag (duration marker) -->
  <path d="M 138 82 Q 148 88 142 98" stroke="#D4944C" stroke-width="0.8" fill="none"/>
  <!-- Lyrics (artifact preview) -->
  <text x="102" y="158" font-size="7.5" fill="#2C2C2C">DN.se</text>
  <text x="102" y="168" font-size="7" fill="#8C8680">14 items</text>

  <!-- Note: fetch_svd — shorter note (0.8s, narrower) on different line -->
  <ellipse cx="120" cy="120" rx="14" ry="5.5" fill="#D4944C" transform="rotate(-8, 120, 120)"/>
  <line x1="134" y1="120" x2="134" y2="148" stroke="#D4944C" stroke-width="1"/>
  <!-- Lyrics -->
  <text x="102" y="180" font-size="7.5" fill="#2C2C2C">SvD.se</text>
  <text x="102" y="190" font-size="7" fill="#8C8680">8 items</text>

  <!-- Note: fetch_scb — longest note (1.8s, widest oval) on third line -->
  <ellipse cx="130" cy="130" rx="24" ry="6" fill="#D4944C" transform="rotate(-8, 130, 130)"/>
  <line x1="154" y1="130" x2="154" y2="156" stroke="#D4944C" stroke-width="1"/>
  <!-- Lyrics -->
  <text x="106" y="202" font-size="7.5" fill="#2C2C2C">SCB API</text>
  <text x="106" y="212" font-size="7" fill="#8C8680">Q4 data</text>

  <!-- Vertical chord bracket: these three are concurrent -->
  <line x1="96" y1="108" x2="96" y2="132" stroke="#D4944C" stroke-width="0.5"/>
  <text x="86" y="122" font-size="6" fill="#D4944C" text-anchor="end">ff</text>

  <!-- Dynamics marking: forte (loud = parallel burst) -->

  <!-- ======================= -->
  <!-- STAFF 2: PROCESS (pure) -->
  <!-- ======================= -->

  <text x="36" y="268" font-size="9" fill="#2B8A8E" font-weight="500">PURE</text>
  <text x="36" y="280" font-size="7" fill="#8C8680">process</text>

  <line x1="80" y1="250" x2="920" y2="250" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="260" x2="920" y2="260" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="270" x2="920" y2="270" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="280" x2="920" y2="280" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="290" x2="920" y2="290" stroke="#D4CFC7" stroke-width="0.25"/>

  <line x1="90" y1="250" x2="90" y2="290" stroke="#D4CFC7" stroke-width="0.5"/>

  <!-- Slurs coming from fetch staff (cross-staff ties) -->
  <path d="M 138 140 Q 200 200 280 260" stroke="#D4CFC7" stroke-width="0.6" fill="none" stroke-dasharray="none"/>
  <path d="M 134 140 Q 190 200 280 265" stroke="#D4CFC7" stroke-width="0.6" fill="none"/>
  <path d="M 154 140 Q 210 200 280 270" stroke="#D4CFC7" stroke-width="0.6" fill="none"/>

  <!-- Particles along slurs -->
  <circle cx="180" cy="180" r="2" fill="#D4944C" opacity="0.4"/>
  <circle cx="200" cy="195" r="2" fill="#D4944C" opacity="0.35"/>
  <circle cx="230" cy="220" r="2" fill="#D4944C" opacity="0.3"/>
  <circle cx="250" cy="240" r="2" fill="#D4944C" opacity="0.25"/>

  <!-- Note: normalize + dedup — short staccato (fast, 0.3s) -->
  <ellipse cx="300" cy="270" rx="8" ry="5.5" fill="#2B8A8E" transform="rotate(-8, 300, 270)"/>
  <line x1="308" y1="270" x2="308" y2="244" stroke="#2B8A8E" stroke-width="1"/>
  <!-- Staccato dot (short duration) -->
  <circle cx="300" cy="278" r="1.5" fill="#2B8A8E"/>
  <!-- Dynamics: piano (quiet = fast, simple) -->
  <text x="286" y="300" font-size="6" fill="#2B8A8E" font-style="italic">p</text>
  <!-- Lyrics -->
  <text x="280" y="312" font-size="7.5" fill="#2C2C2C">normalize</text>
  <text x="280" y="322" font-size="7" fill="#8C8680">22→17 unique</text>
  <!-- Cache marking -->
  <text x="280" y="334" font-size="6" fill="#8C8680" font-style="italic">3 cache hits</text>

  <!-- ========================= -->
  <!-- STAFF 3: LLM (recordable) -->
  <!-- ========================= -->

  <text x="36" y="398" font-size="9" fill="#E8846B" font-weight="500">LLM</text>
  <text x="36" y="410" font-size="7" fill="#8C8680">rank</text>

  <line x1="80" y1="380" x2="920" y2="380" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="390" x2="920" y2="390" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="400" x2="920" y2="400" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="410" x2="920" y2="410" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="80" y1="420" x2="920" y2="420" stroke="#D4CFC7" stroke-width="0.25"/>

  <line x1="90" y1="380" x2="90" y2="420" stroke="#D4CFC7" stroke-width="0.5"/>

  <!-- Slur from normalize to rank -->
  <path d="M 308 290 Q 380 340 420 390" stroke="#D4CFC7" stroke-width="0.6" fill="none"/>
  <!-- Particles -->
  <circle cx="340" cy="310" r="2" fill="#2B8A8E" opacity="0.4"/>
  <circle cx="370" cy="340" r="2" fill="#2B8A8E" opacity="0.3"/>
  <circle cx="395" cy="365" r="2" fill="#2B8A8E" opacity="0.25"/>

  <!-- Note: rank_and_summarize — WHOLE NOTE (very long duration, 8.4s) -->
  <!-- This is the visual centerpiece — a big, sustained note -->
  <ellipse cx="560" cy="400" rx="110" ry="8" fill="none" stroke="#E8846B" stroke-width="1.5" transform="rotate(-3, 560, 400)"/>
  <!-- Inner glow for the sustained note -->
  <ellipse cx="560" cy="400" rx="108" ry="6" fill="#E8846B" opacity="0.06" transform="rotate(-3, 560, 400)"/>

  <!-- Decision marker (fermata-like — a held note with a choice) -->
  <circle cx="560" cy="374" r="2.5" fill="#E8846B"/>
  <path d="M 540 376 Q 560 368 580 376" stroke="#E8846B" stroke-width="0.8" fill="none"/>

  <!-- Crescendo hairpin leading into it (building importance) -->
  <line x1="340" y1="432" x2="450" y2="428" stroke="#E8846B" stroke-width="0.5"/>
  <line x1="340" y1="438" x2="450" y2="432" stroke="#E8846B" stroke-width="0.5"/>
  <text x="390" y="450" font-size="6" fill="#E8846B" font-style="italic">cresc.</text>

  <!-- Dynamics: fortissimo -->
  <text x="455" y="450" font-size="8" fill="#E8846B" font-style="italic">fff</text>

  <!-- Lyrics (the LLM output) -->
  <text x="460" y="462" font-size="8" fill="#2C2C2C">"The Swedish housing market showed early recovery</text>
  <text x="460" y="474" font-size="8" fill="#2C2C2C"> signs in Q4, with SCB reporting increased..."</text>
  <!-- Duration annotation -->
  <text x="460" y="488" font-size="7" fill="#8C8680">8.4s — 47% of total run time</text>

  <!-- ======================== -->
  <!-- STAFF 4: DELIVER (I/O)  -->
  <!-- ======================== -->

  <!-- Using same staff area, below -->
  <!-- Slur from rank to deliver -->
  <path d="M 670 420 Q 720 450 780 400" stroke="#D4CFC7" stroke-width="0.6" fill="none"/>
  <!-- Particles -->
  <circle cx="700" cy="438" r="2" fill="#E8846B" opacity="0.4"/>
  <circle cx="730" cy="440" r="2" fill="#E8846B" opacity="0.3"/>
  <circle cx="755" cy="425" r="2" fill="#E8846B" opacity="0.25"/>

  <!-- Note: deliver — grace note (fast, 0.4s), back on staff 1 area for I/O -->
  <!-- Placing at far right of the I/O staff -->
  <ellipse cx="830" cy="120" rx="10" ry="5.5" fill="#D4944C" transform="rotate(-8, 830, 120)"/>
  <line x1="840" y1="120" x2="840" y2="94" stroke="#D4944C" stroke-width="1"/>
  <!-- Grace note slash -->
  <line x1="836" y1="100" x2="844" y2="92" stroke="#D4944C" stroke-width="0.8"/>
  <!-- Lyrics -->
  <text x="816" y="158" font-size="7.5" fill="#2C2C2C">deliver</text>
  <text x="816" y="168" font-size="7" fill="#8C8680">team@ sent</text>
  <!-- Dynamics: piano (quick, quiet) -->
  <text x="812" y="148" font-size="6" fill="#D4944C" font-style="italic">p</text>

  <!-- Cross-staff slur from rank to deliver -->
  <path d="M 670 400 Q 750 300 820 120" stroke="#D4CFC7" stroke-width="0.6" fill="none"/>

  <!-- Double bar line at end -->
  <line x1="890" y1="100" x2="890" y2="140" stroke="#2C2C2C" stroke-width="0.5"/>
  <line x1="894" y1="100" x2="894" y2="140" stroke="#2C2C2C" stroke-width="1.5"/>
  <line x1="890" y1="250" x2="890" y2="290" stroke="#2C2C2C" stroke-width="0.5"/>
  <line x1="894" y1="250" x2="894" y2="290" stroke="#2C2C2C" stroke-width="1.5"/>
  <line x1="890" y1="380" x2="890" y2="420" stroke="#2C2C2C" stroke-width="0.5"/>
  <line x1="894" y1="380" x2="894" y2="420" stroke="#2C2C2C" stroke-width="1.5"/>

  <!-- ====================== -->
  <!-- ANNOTATIONS / LEGEND   -->
  <!-- ====================== -->

  <!-- Reading guide -->
  <rect x="32" y="508" width="896" height="44" rx="3" fill="none"/>

  <text x="32" y="522" font-size="8" fill="#8C8680">Reading the score:</text>

  <!-- Note duration -->
  <ellipse cx="175" cy="530" rx="6" ry="4" fill="#8C8680"/>
  <text x="186" y="533" font-size="7" fill="#8C8680">short = fast op</text>

  <ellipse cx="280" cy="530" rx="18" ry="4" fill="none" stroke="#8C8680" stroke-width="0.8"/>
  <text x="303" y="533" font-size="7" fill="#8C8680">wide = slow op</text>

  <!-- Dynamics -->
  <text x="395" y="533" font-size="7" fill="#8C8680" font-style="italic">p = light work</text>
  <text x="475" y="533" font-size="7" fill="#8C8680" font-style="italic">fff = bottleneck</text>

  <!-- Slur -->
  <path d="M 570 526 Q 585 520 600 526" stroke="#8C8680" stroke-width="0.6" fill="none"/>
  <text x="607" y="530" font-size="7" fill="#8C8680">= data flows between staves</text>

  <!-- Decision -->
  <circle cx="750" cy="526" r="2" fill="#E8846B"/>
  <path d="M 740 528 Q 750 522 760 528" stroke="#E8846B" stroke-width="0.6" fill="none"/>
  <text x="766" y="530" font-size="7" fill="#8C8680">= decision (fermata)</text>

  <!-- Vertical alignment annotation -->
  <rect x="98" y="96" width="60" height="48" rx="0" fill="none" stroke="#D4944C" stroke-width="0.3" stroke-dasharray="2,3"/>
  <text x="128" y="86" font-size="6" fill="#D4944C" text-anchor="middle">chord = concurrent</text>
</svg>
