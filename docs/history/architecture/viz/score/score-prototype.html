<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="liminara:truth_class" content="historical">
<meta name="liminara:archived_on" content="2026-04-04">
<meta name="liminara:superseded_by" content="work/done/E-09-observation-layer/M-OBS-03-dag-visualization.md,runtime/apps/liminara_web/">
<title>Archived Prototype — Liminara Score</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --paper: #F5F0E8; --paper-white: #FDFBF7;
    --ink: #2C2C2C; --ink-light: #8C8680; --ink-ghost: #D4CFC7;
    --teal: #2B8A8E; --coral: #E8846B; --amber: #D4944C; --red: #C45B4A;
  }
  body { background: var(--paper); font-family: 'IBM Plex Mono', monospace; color: var(--ink); padding: 32px; }
  h1 { font-size: 12px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .sub { font-size: 10px; color: var(--ink-light); margin-bottom: 20px; }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  button { font-family: inherit; font-size: 10px; padding: 5px 12px; background: var(--paper-white); border: 1px solid var(--ink-ghost); color: var(--ink); cursor: pointer; border-radius: 3px; }
  button:hover { border-color: var(--ink-light); }
  button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .status { font-size: 10px; color: var(--ink-light); }
  canvas { display: block; border-radius: 4px; }
  .legend { display: flex; gap: 16px; margin-top: 12px; font-size: 9px; color: var(--ink-light); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
</style>
</head>
<body>
<h1>The Score — Animated Prototype</h1>
<p class="sub">Radar daily briefing. Notes appear as ops execute. Duration = note width. Slurs carry data between staves.</p>
<div class="controls">
  <button id="btn-run" class="active">Play</button>
  <button id="btn-reset">Reset</button>
  <button id="btn-instant">Show Final</button>
  <span class="status" id="status">Ready</span>
</div>
<canvas id="c" width="920" height="380"></canvas>
<div class="legend">
  <div class="legend-item"><span style="display:inline-block;width:14px;height:6px;border-radius:50%;background:#D4944C"></span> I/O (side-effecting)</div>
  <div class="legend-item"><span style="display:inline-block;width:14px;height:6px;border-radius:50%;background:#2B8A8E"></span> Pure (deterministic)</div>
  <div class="legend-item"><span style="display:inline-block;width:14px;height:6px;border-radius:50%;background:#E8846B"></span> LLM (recordable)</div>
  <div class="legend-item"><span style="font-style:italic">p</span> = light &nbsp; <span style="font-style:italic">fff</span> = bottleneck</div>
  <div class="legend-item">wide note = slow op &nbsp; narrow = fast</div>
</div>

<script>
const C = { paper:'#F5F0E8', pw:'#FDFBF7', ink:'#2C2C2C', il:'#8C8680', ig:'#D4CFC7',
            teal:'#2B8A8E', coral:'#E8846B', amber:'#D4944C', red:'#C45B4A' };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
canvas.width = 920 * dpr; canvas.height = 380 * dpr;
canvas.style.width = '920px'; canvas.style.height = '380px';
ctx.scale(dpr, dpr);

// Staff positions (Y center of each 5-line group)
const staves = [
  { y: 90, label: 'I/O', labelColor: C.amber },
  { y: 190, label: 'PURE', labelColor: C.teal },
  { y: 290, label: 'LLM', labelColor: C.coral },
];

// Notes: x = time-proportional position, staff = which staff group, w = width (duration-proportional), line = which staff line (-2 to 2)
const notes = [
  // Fetches (concurrent chord on I/O staff)
  { id:'f1', staff:0, x:110, w:22, line:-1, color:C.amber, startT:200, dur:1200, label:'DN.se', sub:'14 items', dyn:'f' },
  { id:'f2', staff:0, x:110, w:16, line:0,  color:C.amber, startT:200, dur:800,  label:'SvD.se', sub:'8 items', dyn:'f' },
  { id:'f3', staff:0, x:110, w:30, line:1,  color:C.amber, startT:200, dur:1800, label:'SCB API', sub:'Q4 data', dyn:'f' },
  // Normalize (staccato on PURE staff)
  { id:'n1', staff:1, x:310, w:10, line:0,  color:C.teal,  startT:2200, dur:300, label:'normalize', sub:'22→17', dyn:'p', staccato:true },
  // Rank (HUGE whole note on LLM staff)
  { id:'r1', staff:2, x:440, w:180,line:0,  color:C.coral,  startT:2700, dur:8400, label:'rank + summarize', sub:'"The Swedish housing market showed early recovery..."', dyn:'fff', decision:true },
  // Deliver (grace note on I/O staff)
  { id:'d1', staff:0, x:760, w:12, line:0,  color:C.amber, startT:11400, dur:400, label:'deliver', sub:'team@ sent', dyn:'p', grace:true },
];

// Slurs (cross-staff connections)
const slurs = [
  { from:'f1', to:'n1' }, { from:'f2', to:'n1' }, { from:'f3', to:'n1' },
  { from:'n1', to:'r1' }, { from:'r1', to:'d1' },
];

let animTime = 0, running = false, instant = false;
const noteState = {};
const particles = [];

function noteCenter(n) {
  const s = staves[n.staff];
  return { x: n.x + n.w/2, y: s.y + n.line * 8 };
}

function reset() {
  animTime = 0; running = false; instant = false;
  particles.length = 0;
  notes.forEach(n => { noteState[n.id] = { phase:'pending', progress:0 }; });
  document.getElementById('status').textContent = 'Ready';
}

function hex2rgb(h) { return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) }; }
function rgba(h,a) { const {r,g,b}=hex2rgb(h); return `rgba(${r},${g},${b},${a})`; }

function drawStaves() {
  staves.forEach(s => {
    // Label
    ctx.font = '9px IBM Plex Mono, monospace';
    ctx.fillStyle = s.labelColor;
    ctx.textAlign = 'right';
    ctx.fillText(s.label, 60, s.y + 3);
    // 5 lines
    for (let i = -2; i <= 2; i++) {
      ctx.strokeStyle = C.ig; ctx.lineWidth = 0.3;
      ctx.beginPath(); ctx.moveTo(70, s.y + i*8); ctx.lineTo(900, s.y + i*8); ctx.stroke();
    }
    // Opening bar line
    ctx.strokeStyle = C.ig; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(80, s.y-16); ctx.lineTo(80, s.y+16); ctx.stroke();
  });
}

function drawTimeAxis() {
  ctx.strokeStyle = C.ig; ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.moveTo(80, 38); ctx.lineTo(900, 38); ctx.stroke();
  ctx.font = '7px IBM Plex Mono, monospace'; ctx.fillStyle = C.il; ctx.textAlign = 'center';
  [[110,'0s'],[220,'2s'],[370,'5s'],[580,'10s'],[760,'16s'],[870,'18s']].forEach(([x,l]) => {
    ctx.fillText(l, x, 34);
    ctx.beginPath(); ctx.moveTo(x,36); ctx.lineTo(x,40); ctx.stroke();
  });
}

function drawNote(n, t) {
  const st = noteState[n.id];
  const s = staves[n.staff];
  const cy = s.y + n.line * 8;
  const cx = n.x + n.w/2;

  if (st.phase === 'pending') {
    // Ghost placeholder
    ctx.beginPath();
    ctx.ellipse(cx, cy, Math.max(4, n.w/2), 4, -0.12, 0, Math.PI*2);
    ctx.fillStyle = rgba(C.ig, 0.2);
    ctx.fill();
    return;
  }

  const alpha = Math.min(1, st.progress * 3);
  const wProg = 4 + (n.w - 4) * Math.min(1, st.progress * 2);
  const hProg = 2 + 3 * Math.min(1, st.progress * 2);

  // Note body
  const isWhole = n.w > 60;
  ctx.beginPath();
  ctx.ellipse(cx, cy, wProg/2, hProg, -0.12, 0, Math.PI*2);
  if (isWhole) {
    ctx.strokeStyle = rgba(n.color, alpha);
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Inner glow
    ctx.fillStyle = rgba(n.color, 0.06 * alpha);
    ctx.fill();
  } else {
    ctx.fillStyle = rgba(n.color, alpha);
    ctx.fill();
  }

  // Stem (not for whole notes)
  if (!isWhole && st.progress > 0.2) {
    const stemAlpha = Math.min(1, (st.progress - 0.2) * 3);
    const stemDir = n.line <= 0 ? -1 : 1;
    const stemX = stemDir === -1 ? cx + wProg/2 : cx - wProg/2;
    ctx.strokeStyle = rgba(n.color, stemAlpha);
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(stemX, cy);
    ctx.lineTo(stemX, cy + stemDir * 24);
    ctx.stroke();

    // Flag for short notes
    if (n.w < 18 && st.progress > 0.4) {
      const fAlpha = Math.min(1, (st.progress - 0.4) * 3);
      ctx.strokeStyle = rgba(n.color, fAlpha);
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(stemX, cy + stemDir * 24);
      ctx.quadraticCurveTo(stemX + 8, cy + stemDir * 18, stemX + 4, cy + stemDir * 12);
      ctx.stroke();
    }

    // Grace note slash
    if (n.grace && st.progress > 0.3) {
      ctx.strokeStyle = rgba(n.color, stemAlpha);
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(stemX - 3, cy + stemDir * 18);
      ctx.lineTo(stemX + 3, cy + stemDir * 12);
      ctx.stroke();
    }
  }

  // Staccato dot
  if (n.staccato && st.progress > 0.3) {
    ctx.beginPath();
    ctx.arc(cx, cy + 10, 1.5, 0, Math.PI*2);
    ctx.fillStyle = rgba(n.color, Math.min(1, (st.progress-0.3)*3));
    ctx.fill();
  }

  // Decision fermata
  if (n.decision && st.progress > 0.5) {
    const fA = Math.min(1, (st.progress - 0.5) * 3);
    ctx.beginPath();
    ctx.arc(cx, cy - 22, 2, 0, Math.PI*2);
    ctx.fillStyle = rgba(n.color, fA);
    ctx.fill();
    ctx.beginPath();
    ctx.strokeStyle = rgba(n.color, fA);
    ctx.lineWidth = 0.7;
    ctx.moveTo(cx - 12, cy - 18);
    ctx.quadraticCurveTo(cx, cy - 26, cx + 12, cy - 18);
    ctx.stroke();
  }

  // Dynamics
  if (n.dyn && st.progress > 0.6) {
    const dA = Math.min(1, (st.progress - 0.6) * 3);
    ctx.font = '7px IBM Plex Mono, monospace';
    ctx.fillStyle = rgba(n.color, dA * 0.6);
    ctx.textAlign = 'left';
    ctx.font = 'italic 7px IBM Plex Mono, monospace';
    ctx.fillText(n.dyn, n.x - 8, cy + 28);
  }

  // Lyrics (artifact preview)
  if (st.progress > 0.7) {
    const lA = Math.min(1, (st.progress - 0.7) * 3);
    const ly = s.y + 34;
    ctx.font = '8px IBM Plex Mono, monospace';
    ctx.fillStyle = rgba(C.ink, lA);
    ctx.textAlign = 'left';
    const maxW = Math.min(n.sub.length * 5.5, 200);
    ctx.fillText(n.sub.slice(0, Math.floor(n.sub.length * Math.min(1, (st.progress-0.7)*4))), n.x, ly);
    ctx.font = '7.5px IBM Plex Mono, monospace';
    ctx.fillStyle = rgba(C.il, lA);
    ctx.fillText(n.label, n.x, ly + 12);
  }

  // Running shimmer
  if (st.phase === 'running') {
    const shimmer = 0.15 * Math.sin(t * 0.005);
    ctx.beginPath();
    ctx.ellipse(cx, cy, wProg/2 + 4, hProg + 3, -0.12, 0, Math.PI*2);
    ctx.strokeStyle = rgba(n.color, 0.2 + shimmer);
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function spawnSlurParticles(fromN, toN) {
  const fc = noteCenter(fromN), tc = noteCenter(toN);
  const dx = tc.x - fc.x, dy = tc.y - fc.y;
  const cpx = fc.x + dx * 0.5, cpy = Math.min(fc.y, tc.y) - 30 - Math.abs(dy) * 0.3;
  for (let i = 0; i < 4; i++) {
    particles.push({ fx:fc.x, fy:fc.y, tx:tc.x, ty:tc.y, cpx, cpy,
      t: -i * 0.06, speed: 0.006 + Math.random() * 0.003, color: fromN.color, r: 2 + Math.random() });
  }
}

function drawSlurs() {
  slurs.forEach(s => {
    const fn = notes.find(n => n.id === s.from), tn = notes.find(n => n.id === s.to);
    const fc = noteCenter(fn), tc = noteCenter(tn);
    const dx = tc.x - fc.x, dy = tc.y - fc.y;
    const cpx = fc.x + dx * 0.5, cpy = Math.min(fc.y, tc.y) - 30 - Math.abs(dy) * 0.3;
    ctx.beginPath();
    ctx.moveTo(fc.x, fc.y);
    ctx.quadraticCurveTo(cpx, cpy, tc.x, tc.y);
    ctx.strokeStyle = rgba(C.ig, 0.4);
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t > 1.2) { particles.splice(i, 1); continue; }
    if (p.t < 0 || p.t > 1) continue;
    const t = p.t;
    const x = (1-t)*(1-t)*p.fx + 2*(1-t)*t*p.cpx + t*t*p.tx;
    const y = (1-t)*(1-t)*p.fy + 2*(1-t)*t*p.cpy + t*t*p.ty;
    ctx.beginPath(); ctx.arc(x, y, p.r*2, 0, Math.PI*2);
    ctx.fillStyle = rgba(p.color, 0.08); ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI*2);
    ctx.fillStyle = rgba(p.color, 0.6); ctx.fill();
  }
}

function update(dt) {
  if (!running && !instant) return;
  const speed = instant ? 80 : 1;
  animTime += dt * speed;

  notes.forEach(n => {
    const st = noteState[n.id];
    if (st.phase === 'pending' && animTime >= n.startT) {
      st.phase = 'running';
      document.getElementById('status').textContent = `Playing: ${n.label}`;
    }
    if (st.phase === 'running') {
      st.progress = Math.min(1, (animTime - n.startT) / n.dur);
      if (animTime >= n.startT + n.dur) {
        st.phase = 'done'; st.progress = 1;
        slurs.filter(s => s.from === n.id).forEach(s => {
          spawnSlurParticles(n, notes.find(nn => nn.id === s.to));
        });
      }
    }
  });

  if (notes.every(n => noteState[n.id].phase === 'done')) {
    running = false; instant = false;
    document.getElementById('status').textContent = 'Fin. — 18.2s';
  }
}

function draw() {
  ctx.clearRect(0, 0, 920, 380);
  ctx.fillStyle = C.paper; ctx.fillRect(0, 0, 920, 380);
  drawTimeAxis();
  drawStaves();
  drawSlurs();
  drawParticles();
  notes.forEach(n => drawNote(n, animTime));

  // Double bar line at end if done
  if (notes.every(n => noteState[n.id].phase === 'done')) {
    staves.forEach(s => {
      ctx.strokeStyle = C.ink; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(872, s.y-16); ctx.lineTo(872, s.y+16); ctx.stroke();
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(876, s.y-16); ctx.lineTo(876, s.y+16); ctx.stroke();
    });
  }
}

let lastT = 0;
function loop(t) {
  const dt = lastT ? t - lastT : 16; lastT = t;
  update(dt); draw();
  requestAnimationFrame(loop);
}

document.getElementById('btn-run').addEventListener('click', () => { reset(); running = true; });
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-instant').addEventListener('click', () => { reset(); instant = true; running = true; });

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
