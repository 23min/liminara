<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <metadata>Archived historical visualization asset. truth_class: historical. archived_on: 2026-04-04. superseded_by: work/done/E-09-observation-layer/M-OBS-03-dag-visualization.md; runtime/apps/liminara_web/.</metadata>
  <rect width="720" height="200" fill="#F5F0E8"/>

  <text x="24" y="24" font-size="11" fill="#2C2C2C" letter-spacing="0.08em">THE REST — GATES IN THE SCORE</text>
  <text x="24" y="38" font-size="8" fill="#8C8680">A gate is silence. The length of the rest IS the waiting time.</text>
  <line x1="24" y1="46" x2="696" y2="46" stroke="#2C2C2C" stroke-width="0.5" opacity="0.2"/>

  <!-- Staff lines -->
  <line x1="60" y1="80" x2="700" y2="80" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="60" y1="90" x2="700" y2="90" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="60" y1="100" x2="700" y2="100" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="60" y1="110" x2="700" y2="110" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="60" y1="120" x2="700" y2="120" stroke="#D4CFC7" stroke-width="0.25"/>

  <!-- Bar line -->
  <line x1="70" y1="80" x2="70" y2="120" stroke="#D4CFC7" stroke-width="0.5"/>

  <!-- Note before gate: a completed op -->
  <ellipse cx="110" cy="100" rx="14" ry="5.5" fill="#E8846B" transform="rotate(-8, 110, 100)"/>
  <line x1="124" y1="100" x2="124" y2="74" stroke="#E8846B" stroke-width="1"/>
  <text x="96" y="136" font-size="7.5" fill="#2C2C2C">summarize</text>
  <text x="96" y="146" font-size="7" fill="#8C8680">"Draft ready"</text>

  <!-- Arrow to rest -->
  <line x1="135" y1="100" x2="155" y2="100" stroke="#D4CFC7" stroke-width="0.4"/>

  <!-- THE REST (gate) — traditional whole rest symbol, enlarged -->
  <!-- Whole rest: black rectangle hanging from line -->
  <rect x="175" y="90" width="16" height="6" fill="#C45B4A"/>
  <!-- Fermata over the rest (held indefinitely) -->
  <circle cx="183" cy="78" r="2" fill="#C45B4A"/>
  <path d="M 170 82 Q 183 72 196 82" stroke="#C45B4A" stroke-width="0.8" fill="none"/>

  <!-- Gate prompt as lyrics below -->
  <text x="160" y="136" font-size="8" fill="#C45B4A">Approve briefing?</text>
  <text x="160" y="148" font-size="7" fill="#8C8680">waiting for human...</text>

  <!-- The gap — measure of silence -->
  <line x1="210" y1="80" x2="210" y2="120" stroke="#D4CFC7" stroke-width="0.3" stroke-dasharray="2,3"/>

  <!-- Empty measures (the silence) -->
  <!-- Measure numbers -->
  <text x="250" y="76" font-size="6" fill="#D4CFC7">|</text>
  <text x="320" y="76" font-size="6" fill="#D4CFC7">|</text>
  <text x="390" y="76" font-size="6" fill="#D4CFC7">|</text>
  <!-- Sparse bar lines -->
  <line x1="250" y1="80" x2="250" y2="120" stroke="#D4CFC7" stroke-width="0.2"/>
  <line x1="320" y1="80" x2="320" y2="120" stroke="#D4CFC7" stroke-width="0.2"/>
  <line x1="390" y1="80" x2="390" y2="120" stroke="#D4CFC7" stroke-width="0.2"/>

  <!-- Time passing annotation -->
  <path d="M 210 140 L 440 140" stroke="#8C8680" stroke-width="0.3"/>
  <text x="325" y="155" font-size="7" fill="#8C8680" text-anchor="middle">12 minutes of silence</text>
  <text x="325" y="166" font-size="7" fill="#8C8680" text-anchor="middle">the gap IS the wait</text>

  <!-- Gate resolution: bar line, then the next note -->
  <line x1="440" y1="80" x2="440" y2="120" stroke="#D4CFC7" stroke-width="0.5"/>

  <!-- Resolved note — with grace note feel (the human's response triggers it) -->
  <!-- Small grace note (the human's answer) -->
  <ellipse cx="460" cy="90" rx="5" ry="4" fill="#C45B4A" transform="rotate(-8, 460, 90)"/>
  <line x1="465" y1="90" x2="465" y2="70" stroke="#C45B4A" stroke-width="0.7"/>
  <line x1="462" y1="76" x2="468" y2="70" stroke="#C45B4A" stroke-width="0.6"/>
  <!-- Slur to main note -->
  <path d="M 465 90 Q 480 85 490 90" stroke="#C45B4A" stroke-width="0.5" fill="none"/>

  <!-- The main note that follows (computation resumes) -->
  <ellipse cx="500" cy="100" rx="12" ry="5.5" fill="#2B8A8E" transform="rotate(-8, 500, 100)"/>
  <line x1="512" y1="100" x2="512" y2="74" stroke="#2B8A8E" stroke-width="1"/>
  <!-- Dynamic: forte (resuming with energy) -->
  <text x="488" y="132" font-size="6" fill="#2B8A8E" font-style="italic">f</text>

  <text x="456" y="146" font-size="7" fill="#C45B4A">"Approved.</text>
  <text x="456" y="156" font-size="7" fill="#C45B4A"> Add Riksbank note"</text>
  <text x="456" y="168" font-size="7" fill="#8C8680">→ continues</text>

  <!-- Annotation: the grace note IS the human -->
  <line x1="460" y1="68" x2="460" y2="55" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1,2"/>
  <text x="464" y="52" font-size="6.5" fill="#8C8680">human voice</text>
  <text x="464" y="62" font-size="6.5" fill="#8C8680">as grace note</text>

  <!-- Legend -->
  <rect x="560" y="80" width="130" height="70" rx="3" fill="#FDFBF7" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="572" y="96" font-size="7" fill="#8C8680">Musical notation:</text>
  <rect x="572" y="104" width="10" height="4" fill="#C45B4A"/>
  <text x="588" y="110" font-size="7" fill="#8C8680">whole rest = gate</text>
  <circle cx="577" y="122" r="1.5" fill="#C45B4A"/>
  <path d="M 570 124 Q 577 118 584 124" stroke="#C45B4A" stroke-width="0.5" fill="none"/>
  <text x="588" y="126" font-size="7" fill="#8C8680">fermata = held</text>
  <ellipse cx="577" cy="138" rx="4" ry="3" fill="#C45B4A"/>
  <text x="588" y="142" font-size="7" fill="#8C8680">grace note = trigger</text>
</svg>
