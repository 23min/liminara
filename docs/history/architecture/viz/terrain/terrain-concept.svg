<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'IBM Plex Mono', 'Courier New', monospace">
      <metadata>Archived historical visualization asset. truth_class: historical. archived_on: 2026-04-04. superseded_by: work/done/E-09-observation-layer/M-OBS-03-dag-visualization.md; runtime/apps/liminara_web/.</metadata>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#EDE8DE"/>
    </linearGradient>
    <filter id="tw">
      <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="3" result="turb" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="2"/>
    </filter>
  </defs>

  <rect width="960" height="560" fill="url(#sky)"/>

  <text x="32" y="28" font-size="11" fill="#2C2C2C" letter-spacing="0.08em">THE TERRAIN — RADAR PACK DAILY BRIEFING</text>
  <text x="32" y="42" font-size="8" fill="#8C8680">Computation as landscape. Each op raises the terrain. Artifacts flow as water in valleys.</text>
  <line x1="32" y1="50" x2="928" y2="50" stroke="#2C2C2C" stroke-width="0.5" opacity="0.2"/>

  <!-- Time axis at top -->
  <line x1="80" y1="68" x2="900" y2="68" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="80" y="64" font-size="7" fill="#8C8680">0s</text>
  <text x="250" y="64" font-size="7" fill="#8C8680">2s</text>
  <text x="420" y="64" font-size="7" fill="#8C8680">5s</text>
  <text x="640" y="64" font-size="7" fill="#8C8680">12s</text>
  <text x="830" y="64" font-size="7" fill="#8C8680">18s</text>

  <!-- ============================== -->
  <!-- ISOMETRIC TERRAIN VIEW         -->
  <!-- ============================== -->

  <!-- Ground plane (very subtle grid) -->
  <line x1="80" y1="400" x2="900" y2="400" stroke="#D4CFC7" stroke-width="0.3"/>

  <!-- === FETCH HILLS (amber, three parallel peaks) === -->

  <!-- Hill: fetch_dn (medium height) -->
  <path d="M 90 400 Q 110 400 130 360 Q 150 320 170 360 Q 190 400 210 400 Z"
        fill="#D4944C" opacity="0.12" filter="url(#tw)"/>
  <path d="M 90 400 Q 110 400 130 360 Q 150 320 170 360 Q 190 400 210 400"
        stroke="#D4944C" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Contour lines -->
  <path d="M 105 390 Q 130 370 150 340 Q 170 370 195 390" stroke="#D4944C" stroke-width="0.3" fill="none" opacity="0.3"/>
  <path d="M 115 380 Q 135 360 150 348 Q 165 360 185 380" stroke="#D4944C" stroke-width="0.3" fill="none" opacity="0.25"/>
  <!-- Peak label -->
  <text x="150" y="314" font-size="7" fill="#D4944C" text-anchor="middle">DN.se</text>
  <text x="150" y="324" font-size="6.5" fill="#8C8680" text-anchor="middle">14 items</text>
  <!-- Elevation marker -->
  <line x1="150" y1="328" x2="150" y2="400" stroke="#D4944C" stroke-width="0.3" stroke-dasharray="1,3"/>
  <text x="155" y="395" font-size="6" fill="#8C8680">1.2s</text>

  <!-- Hill: fetch_svd (shorter, offset in depth) -->
  <path d="M 110 400 Q 130 400 150 370 Q 160 350 170 370 Q 190 400 200 400 Z"
        fill="#D4944C" opacity="0.08"/>
  <path d="M 110 400 Q 130 400 150 370 Q 160 350 170 370 Q 190 400 200 400"
        stroke="#D4944C" stroke-width="0.7" fill="none" opacity="0.35" stroke-dasharray="2,2"/>
  <text x="160" y="345" font-size="6" fill="#D4944C" text-anchor="middle">SvD.se</text>

  <!-- Hill: fetch_scb (tallest of the three, widest) -->
  <path d="M 100 400 Q 140 400 170 340 Q 190 290 210 340 Q 240 400 270 400 Z"
        fill="#D4944C" opacity="0.15" filter="url(#tw)"/>
  <path d="M 100 400 Q 140 400 170 340 Q 190 290 210 340 Q 240 400 270 400"
        stroke="#D4944C" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Contour lines -->
  <path d="M 120 390 Q 155 355 190 310 Q 215 355 250 390" stroke="#D4944C" stroke-width="0.3" fill="none" opacity="0.3"/>
  <path d="M 135 380 Q 165 345 190 320 Q 210 345 235 380" stroke="#D4944C" stroke-width="0.3" fill="none" opacity="0.25"/>
  <path d="M 148 370 Q 175 340 190 328 Q 205 340 225 370" stroke="#D4944C" stroke-width="0.3" fill="none" opacity="0.2"/>
  <text x="190" y="284" font-size="7" fill="#D4944C" text-anchor="middle">SCB API</text>
  <text x="190" y="294" font-size="6.5" fill="#8C8680" text-anchor="middle">Q4 data</text>
  <line x1="190" y1="298" x2="190" y2="400" stroke="#D4944C" stroke-width="0.3" stroke-dasharray="1,3"/>
  <text x="195" y="395" font-size="6" fill="#8C8680">1.8s</text>

  <!-- === WATER FLOWING FROM FETCH HILLS TO NORMALIZE VALLEY === -->

  <!-- Stream 1 (from DN) -->
  <path d="M 210 398 Q 260 396 310 394 Q 340 392 370 388"
        stroke="#2B8A8E" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Stream 2 (from SvD) -->
  <path d="M 200 398 Q 250 397 320 395 Q 350 393 370 390"
        stroke="#2B8A8E" stroke-width="0.8" fill="none" opacity="0.2"/>
  <!-- Stream 3 (from SCB — widest, most volume) -->
  <path d="M 270 398 Q 300 396 340 393 Q 360 391 370 388"
        stroke="#2B8A8E" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Water particles flowing -->
  <circle cx="240" cy="397" r="2" fill="#D4944C" opacity="0.35"/>
  <circle cx="270" cy="396" r="2" fill="#D4944C" opacity="0.3"/>
  <circle cx="300" cy="394" r="1.5" fill="#D4944C" opacity="0.25"/>
  <circle cx="330" cy="393" r="2" fill="#D4944C" opacity="0.2"/>
  <circle cx="350" cy="391" r="1.5" fill="#D4944C" opacity="0.15"/>

  <!-- === NORMALIZE: Small sharp ridge (fast, pure) === -->

  <path d="M 360 400 Q 380 400 390 380 Q 395 368 400 380 Q 410 400 430 400 Z"
        fill="#2B8A8E" opacity="0.1"/>
  <path d="M 360 400 Q 380 400 390 380 Q 395 368 400 380 Q 410 400 430 400"
        stroke="#2B8A8E" stroke-width="1" fill="none" opacity="0.5"/>
  <text x="395" y="362" font-size="7" fill="#2B8A8E" text-anchor="middle">normalize</text>
  <text x="395" y="372" font-size="6.5" fill="#8C8680" text-anchor="middle">22→17</text>
  <text x="400" y="395" font-size="6" fill="#8C8680">0.3s</text>

  <!-- === WATER TO RANK (single stream, merging) === -->
  <path d="M 430 398 Q 480 395 530 390 Q 580 385 620 370"
        stroke="#2B8A8E" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="460" cy="396" r="2" fill="#2B8A8E" opacity="0.3"/>
  <circle cx="500" cy="393" r="2" fill="#2B8A8E" opacity="0.25"/>
  <circle cx="540" cy="389" r="1.5" fill="#2B8A8E" opacity="0.2"/>
  <circle cx="580" cy="383" r="1.5" fill="#2B8A8E" opacity="0.15"/>

  <!-- === RANK + SUMMARIZE: THE MOUNTAIN (massive, coral, the bottleneck) === -->

  <!-- Main mountain body -->
  <path d="M 530 400 Q 580 400 620 300 Q 650 200 680 180 Q 710 200 740 300 Q 780 400 830 400 Z"
        fill="#E8846B" opacity="0.1" filter="url(#tw)"/>
  <path d="M 530 400 Q 580 400 620 300 Q 650 200 680 180 Q 710 200 740 300 Q 780 400 830 400"
        stroke="#E8846B" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Contour lines (many, because this is TALL) -->
  <path d="M 560 390 Q 610 320 650 220 Q 680 200 710 220 Q 750 320 800 390" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.3"/>
  <path d="M 575 380 Q 620 310 650 230 Q 680 210 710 230 Q 740 310 785 380" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.25"/>
  <path d="M 590 370 Q 630 300 655 240 Q 680 220 705 240 Q 730 300 770 370" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.22"/>
  <path d="M 605 360 Q 640 295 660 250 Q 680 230 700 250 Q 720 295 755 360" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.18"/>
  <path d="M 618 350 Q 648 290 665 258 Q 680 240 695 258 Q 712 290 742 350" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.15"/>
  <path d="M 630 340 Q 655 285 668 265 Q 680 250 692 265 Q 705 285 730 340" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.12"/>

  <!-- Peak -->
  <circle cx="680" cy="175" r="3" fill="#E8846B" opacity="0.6"/>
  <!-- Decision flag at peak -->
  <line x1="680" y1="175" x2="680" y2="148" stroke="#E8846B" stroke-width="0.8"/>
  <path d="M 680 148 L 698 155 L 680 162" fill="#E8846B" opacity="0.4"/>

  <!-- Peak label -->
  <text x="680" y="140" font-size="8" fill="#E8846B" text-anchor="middle" font-weight="500">rank + summarize</text>
  <text x="680" y="152" font-size="6.5" fill="#8C8680" text-anchor="middle">decision recorded</text>

  <!-- Artifact content in the mountain body -->
  <text x="640" y="270" font-size="7.5" fill="#E8846B" opacity="0.6">"The Swedish</text>
  <text x="645" y="282" font-size="7.5" fill="#E8846B" opacity="0.5"> housing market</text>
  <text x="650" y="294" font-size="7.5" fill="#E8846B" opacity="0.4"> showed early</text>
  <text x="655" y="306" font-size="7.5" fill="#E8846B" opacity="0.3"> recovery..."</text>

  <!-- Elevation marker -->
  <line x1="680" y1="180" x2="680" y2="400" stroke="#E8846B" stroke-width="0.3" stroke-dasharray="1,3"/>
  <text x="685" y="395" font-size="6" fill="#8C8680">8.4s</text>

  <!-- === WATER FLOWING DOWN FROM MOUNTAIN TO DELIVER === -->
  <path d="M 830 398 Q 850 397 870 396"
        stroke="#E8846B" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="845" cy="397" r="1.5" fill="#E8846B" opacity="0.25"/>

  <!-- === DELIVER: Small bump at the end === -->
  <path d="M 860 400 Q 875 400 882 390 Q 885 385 888 390 Q 895 400 910 400 Z"
        fill="#D4944C" opacity="0.08"/>
  <path d="M 860 400 Q 875 400 882 390 Q 885 385 888 390 Q 895 400 910 400"
        stroke="#D4944C" stroke-width="0.7" fill="none" opacity="0.4"/>
  <text x="885" y="380" font-size="6" fill="#D4944C" text-anchor="middle">deliver</text>
  <text x="885" y="390" font-size="6" fill="#8C8680" text-anchor="middle">sent</text>

  <!-- ============================== -->
  <!-- CONTOUR MAP VIEW (below)       -->
  <!-- ============================== -->

  <text x="32" y="440" font-size="9" fill="#2C2C2C" letter-spacing="0.05em">CONTOUR MAP VIEW (top-down)</text>
  <line x1="32" y1="448" x2="400" y2="448" stroke="#2C2C2C" stroke-width="0.3" opacity="0.2"/>

  <!-- Simplified contour map of the same terrain -->
  <!-- Fetch cluster (small concentric circles, amber) -->
  <circle cx="100" cy="500" r="14" fill="none" stroke="#D4944C" stroke-width="0.3" opacity="0.3"/>
  <circle cx="100" cy="500" r="10" fill="none" stroke="#D4944C" stroke-width="0.3" opacity="0.4"/>
  <circle cx="100" cy="500" r="6" fill="none" stroke="#D4944C" stroke-width="0.4" opacity="0.5"/>
  <circle cx="100" cy="500" r="2" fill="#D4944C" opacity="0.5"/>
  <text x="100" y="520" font-size="6" fill="#8C8680" text-anchor="middle">fetch</text>

  <!-- Stream connection -->
  <path d="M 114 500 Q 140 498 160 496" stroke="#2B8A8E" stroke-width="0.4" fill="none" opacity="0.2"/>

  <!-- Normalize (tiny circle, teal) -->
  <circle cx="175" cy="496" r="6" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.4"/>
  <circle cx="175" cy="496" r="2" fill="#2B8A8E" opacity="0.5"/>
  <text x="175" y="510" font-size="6" fill="#8C8680" text-anchor="middle">norm</text>

  <!-- Stream to mountain -->
  <path d="M 181 496 Q 210 494 240 490" stroke="#2B8A8E" stroke-width="0.4" fill="none" opacity="0.2"/>

  <!-- RANK: Big concentric contours (coral) — THE DOMINANT FEATURE -->
  <circle cx="300" cy="490" r="40" fill="none" stroke="#E8846B" stroke-width="0.2" opacity="0.15"/>
  <circle cx="300" cy="490" r="34" fill="none" stroke="#E8846B" stroke-width="0.2" opacity="0.18"/>
  <circle cx="300" cy="490" r="28" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.22"/>
  <circle cx="300" cy="490" r="22" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.28"/>
  <circle cx="300" cy="490" r="16" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.35"/>
  <circle cx="300" cy="490" r="10" fill="none" stroke="#E8846B" stroke-width="0.4" opacity="0.45"/>
  <circle cx="300" cy="490" r="4" fill="#E8846B" opacity="0.5"/>
  <!-- Decision flag -->
  <circle cx="300" cy="490" r="2" fill="#E8846B"/>
  <text x="300" y="540" font-size="6" fill="#8C8680" text-anchor="middle">rank (8.4s)</text>

  <!-- Stream to deliver -->
  <path d="M 340 492 Q 350 493 365 494" stroke="#E8846B" stroke-width="0.3" fill="none" opacity="0.2"/>

  <!-- Deliver (tiny bump) -->
  <circle cx="380" cy="496" r="4" fill="none" stroke="#D4944C" stroke-width="0.3" opacity="0.4"/>
  <circle cx="380" cy="496" r="1.5" fill="#D4944C" opacity="0.4"/>
  <text x="380" y="508" font-size="6" fill="#8C8680" text-anchor="middle">deliver</text>

  <!-- Annotation -->
  <text x="450" y="478" font-size="8" fill="#8C8680">The contour map shows</text>
  <text x="450" y="490" font-size="8" fill="#8C8680">the shape of computation.</text>
  <text x="450" y="504" font-size="8" fill="#8C8680">Dense contours = steep terrain</text>
  <text x="450" y="516" font-size="8" fill="#8C8680">= expensive ops.</text>
  <text x="450" y="532" font-size="8" fill="#8C8680">The mountain IS the bottleneck.</text>

  <!-- Ridge line annotation on the main view -->
  <path d="M 150 320 Q 190 290 395 368 Q 540 330 680 180 Q 780 360 885 385"
        stroke="#C45B4A" stroke-width="0.6" fill="none" opacity="0.3" stroke-dasharray="3,3"/>
  <text x="460" y="320" font-size="7" fill="#C45B4A" opacity="0.5">critical path (ridge line)</text>
</svg>
