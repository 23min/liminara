<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <defs>
    <filter id="cw">
      <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="2" result="turb" seed="4"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="0.8"/>
    </filter>
    <!-- Board texture (subtle grain) -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="blend" operator="over"/>
    </filter>
  </defs>

  <!-- Board surface (cream PCB) -->
  <rect width="960" height="580" fill="#F5F0E8" filter="url(#grain)"/>

  <!-- Board edge (subtle rounded rectangle) -->
  <rect x="16" y="16" width="928" height="548" rx="6" fill="none" stroke="#D4CFC7" stroke-width="0.8"/>

  <!-- Mounting holes (the four corners, like a real PCB) -->
  <circle cx="36" cy="36" r="5" fill="none" stroke="#D4CFC7" stroke-width="0.5"/>
  <circle cx="36" cy="36" r="2" fill="#D4CFC7" opacity="0.3"/>
  <circle cx="924" cy="36" r="5" fill="none" stroke="#D4CFC7" stroke-width="0.5"/>
  <circle cx="924" cy="36" r="2" fill="#D4CFC7" opacity="0.3"/>
  <circle cx="36" cy="544" r="5" fill="none" stroke="#D4CFC7" stroke-width="0.5"/>
  <circle cx="36" cy="544" r="2" fill="#D4CFC7" opacity="0.3"/>
  <circle cx="924" cy="544" r="5" fill="none" stroke="#D4CFC7" stroke-width="0.5"/>
  <circle cx="924" cy="544" r="2" fill="#D4CFC7" opacity="0.3"/>

  <!-- SILK SCREEN: Title (white text layer, like PCB markings) -->
  <text x="60" y="36" font-size="10" fill="#2C2C2C" letter-spacing="0.08em" opacity="0.6">THE CIRCUIT — RADAR DAILY BRIEFING v1.0</text>
  <text x="60" y="48" font-size="7" fill="#8C8680">REV A  |  2026-03-20  |  LIMINARA RUNTIME</text>

  <!-- Time axis (silk screen markings) -->
  <text x="112" y="75" font-size="6" fill="#8C8680" text-anchor="middle">0s</text>
  <text x="260" y="75" font-size="6" fill="#8C8680" text-anchor="middle">2s</text>
  <text x="420" y="75" font-size="6" fill="#8C8680" text-anchor="middle">5s</text>
  <text x="650" y="75" font-size="6" fill="#8C8680" text-anchor="middle">12s</text>
  <text x="840" y="75" font-size="6" fill="#8C8680" text-anchor="middle">18s</text>
  <line x1="80" y1="80" x2="900" y2="80" stroke="#D4CFC7" stroke-width="0.3"/>

  <!-- ============================================= -->
  <!-- TRACES (45-degree routed, colored by path)    -->
  <!-- ============================================= -->

  <!-- TRACE: fetch_dn → normalize (amber trace, 45-degree jog) -->
  <path d="M 175 140 L 220 140 L 260 180 L 350 180 L 380 210 L 380 250"
        stroke="#D4944C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- TRACE: fetch_svd → normalize (amber trace) -->
  <path d="M 175 260 L 220 260 L 260 260 L 340 260 L 380 260"
        stroke="#D4944C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- TRACE: fetch_scb → normalize (amber trace, 45-degree jog up) -->
  <path d="M 190 390 L 240 390 L 280 350 L 340 290 L 380 270"
        stroke="#D4944C" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- TRACE: normalize → rank (teal to coral transition) -->
  <path d="M 430 260 L 480 260 L 520 260"
        stroke="#2B8A8E" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- VIA: decision point between normalize and rank -->
  <!-- (where computation crosses from pure to nondeterministic) -->
  <circle cx="520" cy="260" r="7" fill="#F5F0E8" stroke="#E8846B" stroke-width="1.2"/>
  <circle cx="520" cy="260" r="2.5" fill="#E8846B"/>
  <!-- Via label -->
  <text x="520" y="248" font-size="5" fill="#E8846B" text-anchor="middle">VIA</text>

  <!-- TRACE: rank (coral, the long one) -->
  <path d="M 530 260 L 740 260"
        stroke="#E8846B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- TRACE: rank → deliver (coral to amber, 45-degree jog) -->
  <path d="M 740 260 L 780 260 L 810 230 L 810 180"
        stroke="#E8846B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Signal particles flowing along traces -->
  <!-- fetch_dn trace -->
  <circle cx="200" cy="140" r="2.5" fill="#D4944C" opacity="0.7"/>
  <circle cx="240" cy="160" r="2.5" fill="#D4944C" opacity="0.5"/>
  <circle cx="300" cy="180" r="2.5" fill="#D4944C" opacity="0.35"/>
  <!-- fetch_scb trace -->
  <circle cx="220" cy="390" r="2.5" fill="#D4944C" opacity="0.6"/>
  <circle cx="270" cy="360" r="2.5" fill="#D4944C" opacity="0.4"/>
  <circle cx="320" cy="310" r="2.5" fill="#D4944C" opacity="0.3"/>
  <!-- normalize → via -->
  <circle cx="460" cy="260" r="2.5" fill="#2B8A8E" opacity="0.5"/>
  <circle cx="490" cy="260" r="2.5" fill="#2B8A8E" opacity="0.35"/>
  <!-- rank trace -->
  <circle cx="580" cy="260" r="2.5" fill="#E8846B" opacity="0.4"/>
  <circle cx="630" cy="260" r="2.5" fill="#E8846B" opacity="0.3"/>
  <circle cx="680" cy="260" r="2.5" fill="#E8846B" opacity="0.2"/>

  <!-- ============================================= -->
  <!-- PADS → COMPONENTS (the bloom: pad → full IC)  -->
  <!-- ============================================= -->

  <!-- PAD/COMPONENT: fetch_dn (completed — full component with content) -->
  <rect x="90" y="108" width="85" height="58" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="1" filter="url(#cw)"/>
  <!-- Pin 1 marker (standard IC convention) -->
  <circle cx="97" cy="115" r="2" fill="#D4944C" opacity="0.4"/>
  <!-- Component designation (silk screen) -->
  <text x="100" y="123" font-size="6" fill="#8C8680" letter-spacing="0.04em">U1 — fetch_rss</text>
  <!-- Value (the content, dominant) -->
  <text x="100" y="138" font-size="8.5" fill="#2C2C2C">DN.se: 14 items</text>
  <text x="100" y="150" font-size="8" fill="#8C8680">last: 2h ago</text>
  <!-- Timing footprint -->
  <rect x="100" y="157" width="40" height="2" rx="1" fill="#D4944C" opacity="0.25"/>
  <text x="144" y="160" font-size="5.5" fill="#8C8680">1.2s</text>
  <!-- Output pad (right side) -->
  <circle cx="175" cy="140" r="3.5" fill="#D4944C" opacity="0.3"/>
  <circle cx="175" cy="140" r="1.5" fill="#D4944C" opacity="0.6"/>

  <!-- PAD/COMPONENT: fetch_svd -->
  <rect x="90" y="230" width="85" height="52" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="1" filter="url(#cw)"/>
  <circle cx="97" cy="237" r="2" fill="#D4944C" opacity="0.4"/>
  <text x="100" y="245" font-size="6" fill="#8C8680" letter-spacing="0.04em">U2 — fetch_rss</text>
  <text x="100" y="260" font-size="8.5" fill="#2C2C2C">SvD.se: 8 items</text>
  <text x="100" y="272" font-size="8" fill="#8C8680">last: 45m ago</text>
  <circle cx="175" cy="260" r="3.5" fill="#D4944C" opacity="0.3"/>
  <circle cx="175" cy="260" r="1.5" fill="#D4944C" opacity="0.6"/>

  <!-- PAD/COMPONENT: fetch_scb (largest of the fetches) -->
  <rect x="90" y="356" width="100" height="58" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="1" filter="url(#cw)"/>
  <circle cx="97" cy="363" r="2" fill="#D4944C" opacity="0.4"/>
  <text x="100" y="371" font-size="6" fill="#8C8680" letter-spacing="0.04em">U3 — fetch_api</text>
  <text x="100" y="386" font-size="8.5" fill="#2C2C2C">SCB housing API</text>
  <text x="100" y="398" font-size="8" fill="#8C8680">Q4 data available</text>
  <rect x="100" y="405" width="55" height="2" rx="1" fill="#D4944C" opacity="0.25"/>
  <text x="158" y="408" font-size="5.5" fill="#8C8680">1.8s</text>
  <circle cx="190" cy="390" r="3.5" fill="#D4944C" opacity="0.3"/>
  <circle cx="190" cy="390" r="1.5" fill="#D4944C" opacity="0.6"/>

  <!-- PAD/COMPONENT: normalize (small, fast — like a resistor, not an IC) -->
  <rect x="370" y="232" width="60" height="50" rx="3" fill="#FDFBF7" stroke="#2B8A8E" stroke-width="1" filter="url(#cw)"/>
  <circle cx="377" cy="239" r="2" fill="#2B8A8E" opacity="0.4"/>
  <text x="380" y="247" font-size="6" fill="#8C8680" letter-spacing="0.04em">U4 — normalize</text>
  <text x="380" y="262" font-size="8.5" fill="#2C2C2C">22→17 unique</text>
  <text x="380" y="274" font-size="7" fill="#8C8680">5 dedup, 3 cached</text>
  <!-- Input pads (left) -->
  <circle cx="370" cy="250" r="2.5" fill="#D4944C" opacity="0.3"/>
  <circle cx="370" cy="260" r="2.5" fill="#D4944C" opacity="0.3"/>
  <circle cx="370" cy="270" r="2.5" fill="#D4944C" opacity="0.3"/>
  <!-- Output pad (right) -->
  <circle cx="430" cy="260" r="3" fill="#2B8A8E" opacity="0.3"/>
  <circle cx="430" cy="260" r="1.5" fill="#2B8A8E" opacity="0.6"/>

  <!-- PAD/COMPONENT: rank_and_summarize (BIG component — the BGA, ball grid array) -->
  <rect x="540" y="216" width="200" height="82" rx="4" fill="#FDFBF7" stroke="#E8846B" stroke-width="1.2" filter="url(#cw)"/>
  <circle cx="548" cy="224" r="2" fill="#E8846B" opacity="0.4"/>
  <!-- Decision indicator (special marking — like a notch on an IC) -->
  <path d="M 635 216 Q 640 210 645 216" fill="none" stroke="#E8846B" stroke-width="0.8"/>
  <text x="553" y="232" font-size="6" fill="#8C8680" letter-spacing="0.04em">U5 — rank_and_summarize</text>
  <text x="553" y="250" font-size="9" fill="#2C2C2C">"The Swedish housing</text>
  <text x="553" y="264" font-size="9" fill="#2C2C2C"> market showed early</text>
  <text x="553" y="278" font-size="9" fill="#2C2C2C"> recovery signs in Q4..."</text>
  <!-- Wide timing bar (the bottleneck) -->
  <rect x="553" y="288" width="140" height="2.5" rx="1" fill="#E8846B" opacity="0.25"/>
  <text x="697" y="291" font-size="6" fill="#8C8680">8.4s</text>
  <!-- Decision dot (like a BGA ball — the nondeterministic choice) -->
  <circle cx="728" cy="224" r="3.5" fill="#E8846B" opacity="0.6"/>
  <text x="728" y="212" font-size="5" fill="#E8846B" text-anchor="middle">DECISION</text>
  <!-- Input pad -->
  <circle cx="540" cy="260" r="3.5" fill="#E8846B" opacity="0.3"/>
  <!-- Output pad -->
  <circle cx="740" cy="260" r="3.5" fill="#E8846B" opacity="0.3"/>
  <circle cx="740" cy="260" r="1.5" fill="#E8846B" opacity="0.6"/>

  <!-- PAD/COMPONENT: deliver (small connector-style component) -->
  <rect x="790" y="146" width="70" height="52" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="1" filter="url(#cw)"/>
  <circle cx="797" cy="153" r="2" fill="#D4944C" opacity="0.4"/>
  <text x="800" y="161" font-size="6" fill="#8C8680" letter-spacing="0.04em">J1 — deliver</text>
  <text x="800" y="176" font-size="8.5" fill="#2C2C2C">sent to: team@</text>
  <text x="800" y="188" font-size="8" fill="#8C8680">Daily Briefing</text>
  <!-- Input pad -->
  <circle cx="810" cy="198" r="2.5" fill="#D4944C" opacity="0.3"/>

  <!-- ============================================= -->
  <!-- SILK SCREEN ANNOTATIONS                       -->
  <!-- ============================================= -->

  <!-- Bottleneck annotation (silk screen style — like a measurement marking) -->
  <line x1="540" y1="310" x2="540" y2="340" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1.5,2"/>
  <line x1="740" y1="310" x2="740" y2="340" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1.5,2"/>
  <line x1="540" y1="340" x2="740" y2="340" stroke="#8C8680" stroke-width="0.3"/>
  <line x1="540" y1="337" x2="540" y2="343" stroke="#8C8680" stroke-width="0.3"/>
  <line x1="740" y1="337" x2="740" y2="343" stroke="#8C8680" stroke-width="0.3"/>
  <text x="640" y="352" font-size="6" fill="#8C8680" text-anchor="middle">8.4s — 47% of total (bottleneck)</text>

  <!-- Parallel annotation -->
  <text x="60" y="100" font-size="6" fill="#8C8680">3x parallel</text>
  <line x1="78" y1="104" x2="78" y2="420" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1,3"/>

  <!-- Via legend -->
  <text x="520" y="282" font-size="5.5" fill="#8C8680" text-anchor="middle">pure → recordable</text>

  <!-- ============================================= -->
  <!-- BOARD LEGEND (bottom, silk screen style)      -->
  <!-- ============================================= -->

  <line x1="60" y1="440" x2="900" y2="440" stroke="#D4CFC7" stroke-width="0.3"/>

  <!-- Component types -->
  <text x="60" y="462" font-size="7" fill="#8C8680" letter-spacing="0.04em">COMPONENT LEGEND</text>

  <rect x="60" y="472" width="24" height="14" rx="2" fill="#FDFBF7" stroke="#D4944C" stroke-width="0.6"/>
  <text x="90" y="483" font-size="7" fill="#8C8680">I/O component (side-effecting)</text>

  <rect x="60" y="494" width="24" height="14" rx="2" fill="#FDFBF7" stroke="#2B8A8E" stroke-width="0.6"/>
  <text x="90" y="505" font-size="7" fill="#8C8680">Pure component (deterministic)</text>

  <rect x="60" y="516" width="24" height="14" rx="2" fill="#FDFBF7" stroke="#E8846B" stroke-width="0.6"/>
  <text x="90" y="527" font-size="7" fill="#8C8680">LLM component (recordable)</text>

  <!-- Trace legend -->
  <text x="340" y="462" font-size="7" fill="#8C8680" letter-spacing="0.04em">TRACE LEGEND</text>

  <line x1="340" y1="478" x2="370" y2="478" stroke="#D4944C" stroke-width="2" opacity="0.5"/>
  <text x="378" y="482" font-size="7" fill="#8C8680">I/O signal path</text>

  <line x1="340" y1="498" x2="370" y2="498" stroke="#2B8A8E" stroke-width="2" opacity="0.5"/>
  <text x="378" y="502" font-size="7" fill="#8C8680">Pure computation path</text>

  <line x1="340" y1="518" x2="370" y2="518" stroke="#E8846B" stroke-width="2" opacity="0.5"/>
  <text x="378" y="522" font-size="7" fill="#8C8680">LLM/decision path</text>

  <!-- Special markers -->
  <text x="600" y="462" font-size="7" fill="#8C8680" letter-spacing="0.04em">MARKERS</text>

  <circle cx="612" cy="478" r="5" fill="#F5F0E8" stroke="#E8846B" stroke-width="1"/>
  <circle cx="612" cy="478" r="2" fill="#E8846B"/>
  <text x="624" y="482" font-size="7" fill="#8C8680">Via — determinism class transition (decision point)</text>

  <circle cx="612" cy="498" r="3" fill="#D4944C" opacity="0.3"/>
  <circle cx="612" cy="498" r="1.2" fill="#D4944C" opacity="0.7"/>
  <text x="624" y="502" font-size="7" fill="#8C8680">Pad — signal connection point</text>

  <circle cx="612" cy="518" r="3" fill="#E8846B" opacity="0.6"/>
  <text x="624" y="522" font-size="7" fill="#8C8680">BGA ball — decision recorded</text>

  <!-- Trace width note -->
  <text x="60" y="550" font-size="6" fill="#8C8680">Trace width ∝ data volume  |  Component size ∝ op duration  |  45° routing for clarity  |  Board rev increments on each run</text>
</svg>
