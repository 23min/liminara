<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <rect width="720" height="380" fill="#F5F0E8"/>

  <text x="24" y="24" font-size="11" fill="#2C2C2C" letter-spacing="0.08em">CONTOUR MAP — SOFTWARE FACTORY (847 OPS)</text>
  <text x="24" y="38" font-size="8" fill="#8C8680">Top-down view. Dense contours = expensive computation. Size = time. Streams connect phases.</text>
  <line x1="24" y1="46" x2="696" y2="46" stroke="#2C2C2C" stroke-width="0.5" opacity="0.2"/>

  <!-- ===== Planning mountain range (coral, NW quadrant) ===== -->
  <text x="60" y="76" font-size="7" fill="#8C8680">I. Planning</text>

  <!-- LLM decision cluster -->
  <ellipse cx="100" cy="120" rx="30" ry="22" fill="none" stroke="#E8846B" stroke-width="0.25" opacity="0.2" transform="rotate(-15, 100, 120)"/>
  <ellipse cx="100" cy="120" rx="22" ry="16" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.25" transform="rotate(-15, 100, 120)"/>
  <ellipse cx="100" cy="120" rx="14" ry="10" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.35" transform="rotate(-15, 100, 120)"/>
  <ellipse cx="100" cy="120" rx="6" ry="5" fill="none" stroke="#E8846B" stroke-width="0.4" opacity="0.5" transform="rotate(-15, 100, 120)"/>
  <circle cx="100" cy="120" r="2" fill="#E8846B" opacity="0.5"/>

  <!-- Secondary planning peak -->
  <ellipse cx="140" cy="105" rx="18" ry="14" fill="none" stroke="#E8846B" stroke-width="0.25" opacity="0.2" transform="rotate(10, 140, 105)"/>
  <ellipse cx="140" cy="105" rx="10" ry="8" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.3" transform="rotate(10, 140, 105)"/>
  <circle cx="140" cy="105" r="2" fill="#E8846B" opacity="0.4"/>

  <!-- Gate (marked as col/saddle point) -->
  <circle cx="160" cy="130" r="5" fill="none" stroke="#C45B4A" stroke-width="0.5" opacity="0.4"/>
  <circle cx="160" cy="130" r="2" fill="#C45B4A" opacity="0.4"/>
  <text x="168" y="133" font-size="5" fill="#C45B4A">gate</text>

  <!-- Stream to implementation -->
  <path d="M 155 140 Q 185 155 220 165" stroke="#2B8A8E" stroke-width="0.6" fill="none" opacity="0.15"/>
  <circle cx="180" cy="150" r="1.5" fill="#E8846B" opacity="0.2"/>
  <circle cx="200" cy="158" r="1.5" fill="#E8846B" opacity="0.15"/>

  <!-- ===== Implementation mountain range (teal, large central mass) ===== -->
  <text x="230" y="76" font-size="7" fill="#8C8680">II. Implementation</text>

  <!-- MASSIVE teal mountain range -->
  <!-- Outer contour (whole range) -->
  <ellipse cx="340" cy="180" rx="130" ry="80" fill="none" stroke="#2B8A8E" stroke-width="0.2" opacity="0.12" transform="rotate(-5, 340, 180)"/>
  <ellipse cx="340" cy="180" rx="110" ry="65" fill="none" stroke="#2B8A8E" stroke-width="0.2" opacity="0.15" transform="rotate(-5, 340, 180)"/>
  <ellipse cx="340" cy="180" rx="90" ry="52" fill="none" stroke="#2B8A8E" stroke-width="0.25" opacity="0.18" transform="rotate(-5, 340, 180)"/>

  <!-- Multiple peaks within the range -->
  <!-- Peak 1: file generation -->
  <ellipse cx="290" cy="165" rx="30" ry="22" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.25" transform="rotate(-10, 290, 165)"/>
  <ellipse cx="290" cy="165" rx="18" ry="12" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.35" transform="rotate(-10, 290, 165)"/>
  <ellipse cx="290" cy="165" rx="8" ry="5" fill="none" stroke="#2B8A8E" stroke-width="0.4" opacity="0.45" transform="rotate(-10, 290, 165)"/>
  <circle cx="290" cy="165" r="2" fill="#2B8A8E" opacity="0.5"/>

  <!-- Peak 2: compilation (tallest in range) -->
  <ellipse cx="350" cy="185" rx="35" ry="28" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.25" transform="rotate(5, 350, 185)"/>
  <ellipse cx="350" cy="185" rx="24" ry="18" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.3" transform="rotate(5, 350, 185)"/>
  <ellipse cx="350" cy="185" rx="14" ry="10" fill="none" stroke="#2B8A8E" stroke-width="0.35" opacity="0.4" transform="rotate(5, 350, 185)"/>
  <ellipse cx="350" cy="185" rx="5" ry="4" fill="none" stroke="#2B8A8E" stroke-width="0.4" opacity="0.5" transform="rotate(5, 350, 185)"/>
  <circle cx="350" cy="185" r="2" fill="#2B8A8E" opacity="0.6"/>

  <!-- Peak 3: refactoring -->
  <ellipse cx="395" cy="195" rx="24" ry="18" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.22" transform="rotate(15, 395, 195)"/>
  <ellipse cx="395" cy="195" rx="14" ry="10" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.32" transform="rotate(15, 395, 195)"/>
  <circle cx="395" cy="195" r="2" fill="#2B8A8E" opacity="0.45"/>

  <!-- I/O foothills (amber dots within the teal range) -->
  <circle cx="310" cy="200" r="8" fill="none" stroke="#D4944C" stroke-width="0.25" opacity="0.25"/>
  <circle cx="310" cy="200" r="3" fill="none" stroke="#D4944C" stroke-width="0.3" opacity="0.35"/>
  <circle cx="310" cy="200" r="1.5" fill="#D4944C" opacity="0.3"/>

  <circle cx="370" cy="215" r="6" fill="none" stroke="#D4944C" stroke-width="0.25" opacity="0.25"/>
  <circle cx="370" cy="215" r="2" fill="#D4944C" opacity="0.3"/>

  <!-- LLM peaks (coral, scattered in the range) -->
  <circle cx="325" cy="170" r="10" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.2"/>
  <circle cx="325" cy="170" r="4" fill="none" stroke="#E8846B" stroke-width="0.3" opacity="0.35"/>
  <circle cx="325" cy="170" r="1.5" fill="#E8846B" opacity="0.4"/>

  <circle cx="410" cy="180" r="8" fill="none" stroke="#E8846B" stroke-width="0.25" opacity="0.2"/>
  <circle cx="410" cy="180" r="3" fill="#E8846B" opacity="0.3"/>

  <!-- Stream to testing -->
  <path d="M 470 190 Q 490 210 510 230" stroke="#2B8A8E" stroke-width="0.5" fill="none" opacity="0.15"/>
  <circle cx="485" cy="205" r="1.5" fill="#2B8A8E" opacity="0.15"/>

  <!-- ===== Testing (mixed, SE area) ===== -->
  <text x="500" y="200" font-size="7" fill="#8C8680">III. Testing</text>

  <!-- Testing hills (mixed colors, medium size) -->
  <ellipse cx="540" cy="250" rx="40" ry="30" fill="none" stroke="#2B8A8E" stroke-width="0.2" opacity="0.12" transform="rotate(10, 540, 250)"/>
  <ellipse cx="540" cy="250" rx="28" ry="20" fill="none" stroke="#2B8A8E" stroke-width="0.25" opacity="0.18" transform="rotate(10, 540, 250)"/>

  <!-- Test execution peaks -->
  <circle cx="525" cy="240" r="12" fill="none" stroke="#D4944C" stroke-width="0.25" opacity="0.2"/>
  <circle cx="525" cy="240" r="6" fill="none" stroke="#D4944C" stroke-width="0.3" opacity="0.3"/>
  <circle cx="525" cy="240" r="2" fill="#D4944C" opacity="0.35"/>

  <circle cx="555" cy="255" r="10" fill="none" stroke="#2B8A8E" stroke-width="0.25" opacity="0.22"/>
  <circle cx="555" cy="255" r="4" fill="none" stroke="#2B8A8E" stroke-width="0.3" opacity="0.35"/>
  <circle cx="555" cy="255" r="1.5" fill="#2B8A8E" opacity="0.4"/>

  <!-- Failure crater! (red, inverted contours) -->
  <circle cx="545" cy="270" r="8" fill="none" stroke="#C45B4A" stroke-width="0.3" opacity="0.3" stroke-dasharray="2,1"/>
  <circle cx="545" cy="270" r="4" fill="none" stroke="#C45B4A" stroke-width="0.4" opacity="0.4" stroke-dasharray="2,1"/>
  <text x="557" y="273" font-size="5" fill="#C45B4A">failure</text>

  <!-- Stream to review -->
  <path d="M 575 260 Q 595 270 615 280" stroke="#2B8A8E" stroke-width="0.4" fill="none" opacity="0.12"/>

  <!-- ===== Review + Gate (far east, sparse) ===== -->
  <text x="615" y="260" font-size="7" fill="#8C8680">IV. Review</text>

  <!-- Gate: a flat plateau (no peak) -->
  <rect x="620" y="288" width="40" height="20" rx="10" fill="none" stroke="#C45B4A" stroke-width="0.4" opacity="0.3" stroke-dasharray="3,2"/>
  <circle cx="640" cy="298" r="2" fill="#C45B4A" opacity="0.4"/>
  <text x="640" y="315" font-size="5" fill="#C45B4A" text-anchor="middle">gate: 12m wait</text>

  <!-- Post-gate final peaks -->
  <circle cx="680" cy="290" r="8" fill="none" stroke="#2B8A8E" stroke-width="0.25" opacity="0.2"/>
  <circle cx="680" cy="290" r="3" fill="#2B8A8E" opacity="0.3"/>

  <circle cx="695" cy="285" r="6" fill="none" stroke="#D4944C" stroke-width="0.25" opacity="0.2"/>
  <circle cx="695" cy="285" r="2" fill="#D4944C" opacity="0.3"/>

  <!-- ===== Ridge line (critical path) ===== -->
  <path d="M 100 120 Q 160 130 290 165 Q 340 180 350 185 Q 450 195 540 250 Q 570 265 640 298 Q 670 290 695 285"
        stroke="#C45B4A" stroke-width="0.6" fill="none" opacity="0.2" stroke-dasharray="3,3"/>
  <text x="440" y="160" font-size="7" fill="#C45B4A" opacity="0.4">ridge line (critical path)</text>

  <!-- ===== Legend ===== -->
  <rect x="24" y="340" width="672" height="32" rx="3" fill="none"/>
  <text x="32" y="356" font-size="8" fill="#8C8680">Reading the map:</text>

  <circle cx="160" cy="353" r="8" fill="none" stroke="#8C8680" stroke-width="0.2"/>
  <circle cx="160" cy="353" r="4" fill="none" stroke="#8C8680" stroke-width="0.3"/>
  <circle cx="160" cy="353" r="1.5" fill="#8C8680"/>
  <text x="173" y="356" font-size="7" fill="#8C8680">dense contours = expensive</text>

  <circle cx="320" cy="353" r="6" fill="none" stroke="#8C8680" stroke-width="0.2"/>
  <text x="330" y="356" font-size="7" fill="#8C8680">wide = many ops</text>

  <circle cx="420" cy="353" r="4" fill="none" stroke="#C45B4A" stroke-width="0.3" stroke-dasharray="1.5,1"/>
  <text x="428" y="356" font-size="7" fill="#8C8680">dashed = crater (failure)</text>

  <rect x="530" y="348" width="12" height="8" rx="4" fill="none" stroke="#C45B4A" stroke-width="0.3" stroke-dasharray="2,1"/>
  <text x="546" y="356" font-size="7" fill="#8C8680">plateau = gate (waiting)</text>
</svg>
