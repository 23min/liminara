<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liminara Tidepool — Animated Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --paper: #F5F0E8;
    --paper-white: #FDFBF7;
    --ink: #2C2C2C;
    --ink-light: #8C8680;
    --ink-ghost: #D4CFC7;
    --teal: #2B8A8E;
    --coral: #E8846B;
    --amber: #D4944C;
    --red: #C45B4A;
  }

  body {
    background: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
    padding: 32px;
    min-height: 100vh;
  }

  h1 {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 10px;
    color: var(--ink-light);
    margin-bottom: 24px;
  }

  .controls {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    align-items: center;
  }

  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 6px 14px;
    background: var(--paper-white);
    border: 1px solid var(--ink-ghost);
    color: var(--ink);
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  button:hover {
    border-color: var(--ink-light);
  }

  button.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .status {
    font-size: 10px;
    color: var(--ink-light);
  }

  canvas {
    display: block;
    border-radius: 4px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    font-size: 9px;
    color: var(--ink-light);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<h1>Liminara Tidepool Score — Animated Prototype</h1>
<p class="subtitle">Radar Pack daily briefing. Watch the computation bloom.</p>

<div class="controls">
  <button id="btn-run" class="active">Run</button>
  <button id="btn-reset">Reset</button>
  <button id="btn-instant">Show Final</button>
  <span class="status" id="status">Ready</span>
</div>

<canvas id="canvas" width="880" height="420"></canvas>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background: #D4944C"></div> side-effecting (I/O)</div>
  <div class="legend-item"><div class="legend-dot" style="background: #2B8A8E"></div> pure (deterministic)</div>
  <div class="legend-item"><div class="legend-dot" style="background: #E8846B"></div> recordable (LLM)</div>
  <div class="legend-item"><div class="legend-dot" style="background: #C45B4A"></div> gate (human)</div>
  <div class="legend-item"><div class="legend-dot" style="background: #E8846B; border: 2px solid #E8846B; width: 6px; height: 6px;"></div> decision recorded</div>
</div>

<script>
const C = {
  paper: '#F5F0E8',
  paperWhite: '#FDFBF7',
  ink: '#2C2C2C',
  inkLight: '#8C8680',
  inkGhost: '#D4CFC7',
  teal: '#2B8A8E',
  coral: '#E8846B',
  amber: '#D4944C',
  red: '#C45B4A',
};

// Node definitions: the Radar pipeline
const nodes = [
  { id: 'fetch_dn',   lane: 0, x: 80,  label: 'fetch_rss',         color: C.amber, duration: 1200, preview: ['DN.se: 14 items', 'last: 2h ago'] },
  { id: 'fetch_svd',  lane: 1, x: 80,  label: 'fetch_rss',         color: C.amber, duration: 800,  preview: ['SvD.se: 8 items', 'last: 45m ago'] },
  { id: 'fetch_scb',  lane: 2, x: 80,  label: 'fetch_api',         color: C.amber, duration: 1800, preview: ['SCB housing API', 'Q4 data available'] },
  { id: 'normalize',  lane: 1, x: 280, label: 'normalize + dedup',  color: C.teal,  duration: 300,  preview: ['22 items in', '17 unique (5 dedup)'], deps: ['fetch_dn', 'fetch_svd', 'fetch_scb'] },
  { id: 'rank',       lane: 1, x: 440, label: 'rank_and_summarize', color: C.coral,  duration: 8400, preview: ['"The Swedish housing', ' market showed early', ' recovery signs in Q4..."'], decision: true, deps: ['normalize'] },
  { id: 'deliver',    lane: 1, x: 720, label: 'deliver_email',      color: C.amber, duration: 400,  preview: ['sent to: team@', 'Daily Radar Briefing'], deps: ['rank'] },
];

// Edges
const edges = [
  { from: 'fetch_dn', to: 'normalize' },
  { from: 'fetch_svd', to: 'normalize' },
  { from: 'fetch_scb', to: 'normalize' },
  { from: 'normalize', to: 'rank' },
  { from: 'rank', to: 'deliver' },
];

// State
let animTime = 0;
let running = false;
let instant = false;
const nodeState = {};
const particles = [];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// High DPI
const dpr = window.devicePixelRatio || 1;
canvas.width = 880 * dpr;
canvas.height = 420 * dpr;
canvas.style.width = '880px';
canvas.style.height = '420px';
ctx.scale(dpr, dpr);

const laneY = [80, 170, 260, 340];
const cardW = 150;
const cardH = 56;

function nodeById(id) { return nodes.find(n => n.id === id); }

function getNodeCenter(n) {
  return { x: n.x + cardW / 2, y: laneY[n.lane] };
}

function resetState() {
  animTime = 0;
  running = false;
  instant = false;
  particles.length = 0;
  nodes.forEach(n => {
    nodeState[n.id] = {
      phase: 'pending', // pending, running, blooming, done
      startTime: null,
      bloomProgress: 0,
      rippleRadius: 0,
      opacity: 0.3,
    };
  });
  // Schedule start times based on deps
  nodeState['fetch_dn'].startTime = 200;
  nodeState['fetch_svd'].startTime = 200;
  nodeState['fetch_scb'].startTime = 200;
  nodeState['normalize'].startTime = 2200;
  nodeState['rank'].startTime = 2700;
  nodeState['deliver'].startTime = 11400;

  document.getElementById('status').textContent = 'Ready';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function rgba(hex, a) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

function drawLanes() {
  ctx.strokeStyle = C.inkGhost;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([]);
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(30, laneY[i]);
    ctx.lineTo(860, laneY[i]);
    ctx.stroke();
  }
  // Lane labels
  ctx.font = '9px IBM Plex Mono, monospace';
  ctx.fillStyle = C.inkLight;
  ctx.textAlign = 'right';
  ctx.fillText('fetch', 60, laneY[0] + 3);
  ctx.fillText('process', 60, laneY[1] + 3);
  ctx.fillText('source', 60, laneY[2] + 3);
}

function drawTimeAxis() {
  ctx.strokeStyle = C.inkGhost;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(70, 28);
  ctx.lineTo(860, 28);
  ctx.stroke();

  ctx.font = '8px IBM Plex Mono, monospace';
  ctx.fillStyle = C.inkLight;
  ctx.textAlign = 'center';

  const ticks = [
    { x: 80, label: '0s' },
    { x: 220, label: '2s' },
    { x: 360, label: '5s' },
    { x: 560, label: '10s' },
    { x: 720, label: '16s' },
    { x: 840, label: '18s' },
  ];
  ticks.forEach(t => {
    ctx.fillText(t.label, t.x, 24);
    ctx.beginPath();
    ctx.moveTo(t.x, 26);
    ctx.lineTo(t.x, 30);
    ctx.stroke();
  });
}

function drawEdge(fromNode, toNode, progress) {
  const from = getNodeCenter(fromNode);
  const to = getNodeCenter(toNode);

  const cpX = (from.x + to.x) / 2;
  const cpY = (from.y + to.y) / 2 - 20;

  ctx.strokeStyle = rgba(C.inkGhost, 0.5);
  ctx.lineWidth = 0.6;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.quadraticCurveTo(cpX, cpY, to.x, to.y);
  ctx.stroke();
}

function spawnParticles(fromId, toId) {
  const fromNode = nodeById(fromId);
  const toNode = nodeById(toId);
  const from = getNodeCenter(fromNode);
  const to = getNodeCenter(toNode);

  for (let i = 0; i < 5; i++) {
    particles.push({
      fromX: from.x, fromY: from.y,
      toX: to.x, toY: to.y,
      cpX: (from.x + to.x) / 2,
      cpY: (from.y + to.y) / 2 - 20,
      t: -i * 0.08,
      speed: 0.008 + Math.random() * 0.004,
      color: fromNode.color,
      radius: 2 + Math.random() * 1.5,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t > 1.2) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  particles.forEach(p => {
    if (p.t < 0 || p.t > 1) return;
    const t = p.t;
    const x = (1 - t) * (1 - t) * p.fromX + 2 * (1 - t) * t * p.cpX + t * t * p.toX;
    const y = (1 - t) * (1 - t) * p.fromY + 2 * (1 - t) * t * p.cpY + t * t * p.toY;

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, p.radius * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = rgba(p.color, 0.1);
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = rgba(p.color, 0.7);
    ctx.fill();
  });
}

function drawNode(node, t) {
  const state = nodeState[node.id];
  const cx = node.x + cardW / 2;
  const cy = laneY[node.lane];

  if (state.phase === 'pending') {
    // Small ghost dot
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fillStyle = rgba(C.inkGhost, 0.5);
    ctx.fill();
    return;
  }

  if (state.phase === 'running') {
    // Pulsing dot with ripple
    const pulse = 0.7 + 0.3 * Math.sin(t * 0.004);
    const ripple = (t - state.startTime) % 1200;
    const rippleR = 8 + (ripple / 1200) * 20;
    const rippleA = Math.max(0, 0.3 * (1 - ripple / 1200));

    // Ripple
    ctx.beginPath();
    ctx.arc(cx, cy, rippleR, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(node.color, rippleA);
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Dot
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI * 2);
    ctx.fillStyle = rgba(node.color, pulse);
    ctx.fill();

    // Label
    ctx.font = '8px IBM Plex Mono, monospace';
    ctx.fillStyle = rgba(C.inkLight, 0.6);
    ctx.textAlign = 'center';
    ctx.fillText(node.label, cx, cy + 22);
    return;
  }

  if (state.phase === 'blooming' || state.phase === 'done') {
    const bp = state.bloomProgress; // 0 to 1

    // Card dimensions interpolated
    const w = 12 + (cardW - 12) * bp;
    const h = 12 + (cardH - 12) * bp;
    const r = 4;
    const x = cx - w / 2;
    const y = cy - h / 2;

    // Card background
    ctx.fillStyle = C.paperWhite;
    ctx.strokeStyle = rgba(node.color, 0.6 + 0.4 * bp);
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
    ctx.stroke();

    // Left color bar
    ctx.fillStyle = node.color;
    ctx.beginPath();
    ctx.roundRect(x, y, 3, h, [r, 0, 0, r]);
    ctx.fill();

    if (bp > 0.3) {
      const textAlpha = Math.min(1, (bp - 0.3) / 0.5);

      // Op name
      ctx.font = '7px IBM Plex Mono, monospace';
      ctx.fillStyle = rgba(C.inkLight, textAlpha);
      ctx.textAlign = 'left';
      ctx.fillText(node.label, x + 10, y + 12);

      // Preview lines
      ctx.font = '9px IBM Plex Mono, monospace';
      ctx.fillStyle = rgba(C.ink, textAlpha);
      node.preview.forEach((line, i) => {
        if (i < 2 || bp > 0.6) {
          ctx.fillText(line, x + 10, y + 25 + i * 12);
        }
      });

      // Timing bar
      if (bp > 0.8) {
        const barAlpha = (bp - 0.8) / 0.2;
        const barW = Math.min(80, (node.duration / 8400) * 100);
        ctx.fillStyle = rgba(node.color, 0.3 * barAlpha);
        ctx.beginPath();
        ctx.roundRect(x + 10, y + h - 8, barW, 2, 1);
        ctx.fill();

        ctx.font = '7px IBM Plex Mono, monospace';
        ctx.fillStyle = rgba(C.inkLight, barAlpha);
        ctx.fillText((node.duration / 1000).toFixed(1) + 's', x + 14 + barW, y + h - 5);
      }

      // Decision indicator
      if (node.decision && bp > 0.7) {
        ctx.beginPath();
        ctx.arc(x + w - 8, y + 8, 3, 0, Math.PI * 2);
        ctx.fillStyle = rgba(C.coral, (bp - 0.7) / 0.3);
        ctx.fill();
      }
    }
  }
}

function update(dt) {
  if (!running && !instant) return;

  const speed = instant ? 100 : 1;
  animTime += dt * speed;

  nodes.forEach(node => {
    const state = nodeState[node.id];
    const st = state.startTime;

    if (state.phase === 'pending' && animTime >= st) {
      state.phase = 'running';
      document.getElementById('status').textContent = `Running: ${node.label}`;
    }

    if (state.phase === 'running' && animTime >= st + node.duration) {
      state.phase = 'blooming';
      // Spawn particles to downstream nodes
      edges.filter(e => e.from === node.id).forEach(e => {
        spawnParticles(node.id, e.to);
      });
    }

    if (state.phase === 'blooming') {
      state.bloomProgress = Math.min(1, state.bloomProgress + dt * speed * 0.002);
      if (state.bloomProgress >= 1) {
        state.phase = 'done';
      }
    }
  });

  updateParticles();

  // Check if all done
  if (nodes.every(n => nodeState[n.id].phase === 'done')) {
    running = false;
    instant = false;
    document.getElementById('status').textContent = 'Complete — 18.2s total';
  }
}

function draw() {
  ctx.clearRect(0, 0, 880, 420);
  ctx.fillStyle = C.paper;
  ctx.fillRect(0, 0, 880, 420);

  drawTimeAxis();
  drawLanes();

  // Draw edges
  edges.forEach(e => {
    const fromNode = nodeById(e.from);
    const toNode = nodeById(e.to);
    drawEdge(fromNode, toNode);
  });

  // Draw particles
  drawParticles();

  // Draw nodes
  nodes.forEach(n => drawNode(n, animTime));
}

let lastTime = 0;
function loop(time) {
  const dt = lastTime ? time - lastTime : 16;
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Controls
document.getElementById('btn-run').addEventListener('click', () => {
  if (!running) {
    resetState();
    running = true;
    document.getElementById('btn-run').classList.add('active');
    document.getElementById('status').textContent = 'Starting...';
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  resetState();
  document.getElementById('btn-run').classList.remove('active');
});

document.getElementById('btn-instant').addEventListener('click', () => {
  resetState();
  instant = true;
  running = true;
});

// Init
resetState();
requestAnimationFrame(loop);
</script>

</body>
</html>
