<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <defs>
    <filter id="w2">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="2" result="turb" seed="5"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1"/>
    </filter>
  </defs>

  <!-- LEFT: Conventional -->
  <rect x="0" y="0" width="440" height="440" fill="#FFFFFF"/>
  <text x="20" y="24" font-size="11" fill="#333333" letter-spacing="0.06em">CONVENTIONAL</text>
  <text x="20" y="38" font-size="8" fill="#999999">Same DAG. Standard box-and-arrow rendering.</text>

  <!-- Boxes -->
  <rect x="40" y="70" width="120" height="36" rx="4" fill="#FFFFFF" stroke="#999999" stroke-width="1"/>
  <text x="100" y="92" font-size="10" fill="#333333" text-anchor="middle">fetch_rss (DN)</text>
  <circle cx="148" cy="88" r="6" fill="#4CAF50"/>

  <rect x="40" y="130" width="120" height="36" rx="4" fill="#FFFFFF" stroke="#999999" stroke-width="1"/>
  <text x="100" y="152" font-size="10" fill="#333333" text-anchor="middle">fetch_rss (SvD)</text>
  <circle cx="148" cy="148" r="6" fill="#4CAF50"/>

  <rect x="40" y="190" width="120" height="36" rx="4" fill="#FFFFFF" stroke="#999999" stroke-width="1"/>
  <text x="100" y="212" font-size="10" fill="#333333" text-anchor="middle">fetch_api (SCB)</text>
  <circle cx="148" cy="208" r="6" fill="#4CAF50"/>

  <rect x="210" y="130" width="120" height="36" rx="4" fill="#FFFFFF" stroke="#999999" stroke-width="1"/>
  <text x="270" y="152" font-size="10" fill="#333333" text-anchor="middle">normalize</text>
  <circle cx="318" cy="148" r="6" fill="#4CAF50"/>

  <rect x="210" y="240" width="120" height="36" rx="4" fill="#FFFFFF" stroke="#999999" stroke-width="1"/>
  <text x="270" y="262" font-size="10" fill="#333333" text-anchor="middle">rank_summarize</text>
  <circle cx="318" cy="258" r="6" fill="#2196F3"/>

  <rect x="210" y="340" width="120" height="36" rx="4" fill="#FFFFFF" stroke="#999999" stroke-width="1"/>
  <text x="270" y="362" font-size="10" fill="#333333" text-anchor="middle">deliver_email</text>
  <circle cx="318" cy="358" r="6" fill="#FF9800"/>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#999999"/>
    </marker>
  </defs>

  <line x1="100" y1="106" x2="210" y2="138" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="166" x2="210" y2="148" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="226" x2="210" y2="155" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="166" x2="270" y2="240" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="276" x2="270" y2="340" stroke="#999999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Status: green circles, no content visible -->
  <text x="20" y="420" font-size="8" fill="#999999">Status visible. Content hidden. Time invisible. All nodes equal size.</text>

  <!-- Divider -->
  <line x1="440" y1="0" x2="440" y2="440" stroke="#D4CFC7" stroke-width="1"/>

  <!-- RIGHT: Tidepool -->
  <rect x="440" y="0" width="460" height="440" fill="#F5F0E8"/>
  <text x="460" y="24" font-size="11" fill="#2C2C2C" letter-spacing="0.06em">TIDEPOOL</text>
  <text x="460" y="38" font-size="8" fill="#8C8680">Same DAG. Content is the node. Time is the axis.</text>

  <!-- Time axis -->
  <line x1="470" y1="55" x2="880" y2="55" stroke="#D4CFC7" stroke-width="0.4"/>
  <text x="480" y="52" font-size="7" fill="#8C8680">0s</text>
  <text x="580" y="52" font-size="7" fill="#8C8680">2s</text>
  <text x="780" y="52" font-size="7" fill="#8C8680">16s</text>

  <!-- Lane lines -->
  <line x1="470" y1="100" x2="880" y2="100" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="470" y1="180" x2="880" y2="180" stroke="#D4CFC7" stroke-width="0.25"/>
  <line x1="470" y1="260" x2="880" y2="260" stroke="#D4CFC7" stroke-width="0.25"/>

  <!-- Structural threads -->
  <path d="M 555 100 Q 590 140 610 180" stroke="#D4CFC7" stroke-width="0.4" fill="none"/>
  <path d="M 555 180 Q 585 180 610 182" stroke="#D4CFC7" stroke-width="0.4" fill="none"/>
  <path d="M 570 260 Q 590 220 610 185" stroke="#D4CFC7" stroke-width="0.4" fill="none"/>
  <path d="M 680 182 Q 720 220 740 260" stroke="#D4CFC7" stroke-width="0.4" fill="none"/>
  <path d="M 830 262 Q 845 310 850 340" stroke="#D4CFC7" stroke-width="0.4" fill="none"/>

  <!-- Particles -->
  <circle cx="570" cy="120" r="2" fill="#D4944C" opacity="0.5"/>
  <circle cx="582" cy="142" r="2" fill="#D4944C" opacity="0.4"/>
  <circle cx="590" cy="174" r="2" fill="#D4944C" opacity="0.3"/>
  <circle cx="695" cy="200" r="2" fill="#2B8A8E" opacity="0.4"/>
  <circle cx="715" cy="228" r="2" fill="#2B8A8E" opacity="0.3"/>
  <circle cx="840" cy="290" r="2" fill="#E8846B" opacity="0.4"/>
  <circle cx="845" cy="318" r="2" fill="#E8846B" opacity="0.3"/>

  <!-- fetch_dn: bloomed card -->
  <rect x="478" y="72" width="80" height="44" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="0.7" filter="url(#w2)"/>
  <rect x="478" y="72" width="2" height="44" rx="1" fill="#D4944C"/>
  <text x="487" y="84" font-size="6" fill="#8C8680">fetch_rss</text>
  <text x="487" y="96" font-size="7.5" fill="#2C2C2C">DN.se: 14 items</text>
  <text x="487" y="107" font-size="7.5" fill="#2C2C2C">last: 2h ago</text>

  <!-- fetch_svd: bloomed card -->
  <rect x="478" y="155" width="80" height="44" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="0.7" filter="url(#w2)"/>
  <rect x="478" y="155" width="2" height="44" rx="1" fill="#D4944C"/>
  <text x="487" y="167" font-size="6" fill="#8C8680">fetch_rss</text>
  <text x="487" y="179" font-size="7.5" fill="#2C2C2C">SvD.se: 8 items</text>
  <text x="487" y="190" font-size="7.5" fill="#2C2C2C">last: 45m ago</text>

  <!-- fetch_scb: bloomed card -->
  <rect x="478" y="235" width="95" height="44" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="0.7" filter="url(#w2)"/>
  <rect x="478" y="235" width="2" height="44" rx="1" fill="#D4944C"/>
  <text x="487" y="247" font-size="6" fill="#8C8680">fetch_api</text>
  <text x="487" y="259" font-size="7.5" fill="#2C2C2C">SCB housing API</text>
  <text x="487" y="270" font-size="7.5" fill="#2C2C2C">Q4 data ready</text>

  <!-- normalize: bloomed card (teal) -->
  <rect x="608" y="155" width="80" height="44" rx="3" fill="#FDFBF7" stroke="#2B8A8E" stroke-width="0.7" filter="url(#w2)"/>
  <rect x="608" y="155" width="2" height="44" rx="1" fill="#2B8A8E"/>
  <text x="617" y="167" font-size="6" fill="#8C8680">normalize</text>
  <text x="617" y="179" font-size="7.5" fill="#2C2C2C">22 in, 17 unique</text>
  <text x="617" y="190" font-size="7.5" fill="#8C8680">5 deduped</text>

  <!-- rank: WIDE bloomed card (coral, the bottleneck) -->
  <rect x="718" y="228" width="120" height="60" rx="3" fill="#FDFBF7" stroke="#E8846B" stroke-width="0.7" filter="url(#w2)"/>
  <rect x="718" y="228" width="2" height="60" rx="1" fill="#E8846B"/>
  <circle cx="831" cy="235" r="2.5" fill="#E8846B"/>
  <text x="727" y="240" font-size="6" fill="#8C8680">rank_and_summarize</text>
  <text x="727" y="253" font-size="7.5" fill="#2C2C2C">"The Swedish housing</text>
  <text x="727" y="264" font-size="7.5" fill="#2C2C2C"> market showed early</text>
  <text x="727" y="275" font-size="7.5" fill="#2C2C2C"> recovery signs..."</text>
  <rect x="727" y="282" width="60" height="1.5" rx="0.75" fill="#E8846B" opacity="0.3"/>
  <text x="790" y="285" font-size="5.5" fill="#8C8680">8.4s</text>

  <!-- deliver: bloomed card -->
  <rect x="838" y="328" width="54" height="44" rx="3" fill="#FDFBF7" stroke="#D4944C" stroke-width="0.7" filter="url(#w2)"/>
  <rect x="838" y="328" width="2" height="44" rx="1" fill="#D4944C"/>
  <text x="847" y="340" font-size="6" fill="#8C8680">deliver</text>
  <text x="847" y="352" font-size="7.5" fill="#2C2C2C">team@</text>
  <text x="847" y="363" font-size="7.5" fill="#2C2C2C">sent</text>

  <!-- Bottleneck annotation -->
  <line x1="718" y1="296" x2="718" y2="400" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1.5,3"/>
  <line x1="838" y1="296" x2="838" y2="400" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1.5,3"/>
  <text x="778" y="410" font-size="7" fill="#8C8680" text-anchor="middle">bottleneck visible as width</text>

  <text x="460" y="420" font-size="8" fill="#8C8680">Content visible. Time encoded spatially. Bottleneck is obvious. Data flows as particles.</text>
</svg>
