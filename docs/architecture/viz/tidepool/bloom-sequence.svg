<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <defs>
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-coral">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="wobble">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="turb" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.5"/>
    </filter>
  </defs>

  <rect width="720" height="280" fill="#F5F0E8"/>

  <text x="24" y="28" font-size="11" fill="#2C2C2C" letter-spacing="0.08em">THE BLOOM SEQUENCE</text>
  <line x1="24" y1="36" x2="696" y2="36" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3"/>

  <!-- Timeline arrow -->
  <line x1="40" y1="140" x2="680" y2="140" stroke="#D4CFC7" stroke-width="0.5"/>
  <polygon points="680,137 688,140 680,143" fill="#D4CFC7"/>
  <text x="692" y="143" font-size="8" fill="#8C8680">time</text>

  <!-- Stage 1: Pending (small ghost dot) -->
  <circle cx="100" cy="140" r="5" fill="#D4CFC7"/>
  <text x="100" y="180" font-size="9" fill="#2C2C2C" text-anchor="middle">pending</text>
  <text x="100" y="192" font-size="8" fill="#8C8680" text-anchor="middle">seed</text>

  <!-- Dotted line between stages -->
  <line x1="120" y1="140" x2="175" y2="140" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Stage 2: Running (pulsing dot with ripple) -->
  <circle cx="210" cy="140" r="16" fill="none" stroke="#2B8A8E" stroke-width="0.5" opacity="0.2"/>
  <circle cx="210" cy="140" r="12" fill="none" stroke="#2B8A8E" stroke-width="0.5" opacity="0.4"/>
  <circle cx="210" cy="140" r="8" fill="#2B8A8E" opacity="0.8"/>
  <text x="210" y="180" font-size="9" fill="#2C2C2C" text-anchor="middle">running</text>
  <text x="210" y="192" font-size="8" fill="#8C8680" text-anchor="middle">pulse + ripple</text>

  <line x1="235" y1="140" x2="285" y2="140" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Stage 3: Blooming (expanding, content emerging) -->
  <circle cx="340" cy="140" r="28" fill="#2B8A8E" opacity="0.08"/>
  <circle cx="340" cy="140" r="8" fill="#2B8A8E"/>
  <!-- Content fragments appearing -->
  <text x="340" y="126" font-size="7" fill="#2C2C2C" text-anchor="middle" opacity="0.4">"The Swedish hou...</text>
  <line x1="348" y1="140" x2="372" y2="126" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1,2"/>
  <text x="340" y="180" font-size="9" fill="#2C2C2C" text-anchor="middle">blooming</text>
  <text x="340" y="192" font-size="8" fill="#8C8680" text-anchor="middle">content emerging</text>

  <line x1="380" y1="140" x2="420" y2="140" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Stage 4: Completed (full card with content) -->
  <rect x="440" y="108" width="160" height="64" rx="4" fill="#FDFBF7" stroke="#2B8A8E" stroke-width="1" filter="url(#wobble)"/>
  <rect x="440" y="108" width="3" height="64" rx="1.5" fill="#2B8A8E"/>
  <text x="452" y="122" font-size="7" fill="#8C8680">summarize</text>
  <text x="452" y="138" font-size="8.5" fill="#2C2C2C">"The Swedish housing</text>
  <text x="452" y="150" font-size="8.5" fill="#2C2C2C"> market showed signs of</text>
  <text x="452" y="162" font-size="8.5" fill="#2C2C2C"> recovery in Q1..."</text>
  <!-- Timing bar -->
  <rect x="452" y="166" width="80" height="2" rx="1" fill="#2B8A8E" opacity="0.3"/>
  <text x="536" y="169" font-size="6" fill="#8C8680">320ms</text>

  <text x="520" y="200" font-size="9" fill="#2C2C2C" text-anchor="middle">completed</text>
  <text x="520" y="212" font-size="8" fill="#8C8680" text-anchor="middle">content is the node</text>

  <!-- Particles departing -->
  <circle cx="608" cy="136" r="3" fill="#2B8A8E" opacity="0.7"/>
  <circle cx="620" cy="142" r="3" fill="#2B8A8E" opacity="0.5"/>
  <circle cx="630" cy="136" r="3" fill="#2B8A8E" opacity="0.3"/>
  <text x="635" y="160" font-size="7" fill="#8C8680">particles</text>
  <text x="635" y="168" font-size="7" fill="#8C8680">depart</text>

  <!-- Decision bloom variant -->
  <text x="24" y="240" font-size="9" fill="#2C2C2C" letter-spacing="0.05em">Decision bloom (recordable op):</text>

  <!-- Ghost alternatives -->
  <circle cx="100" cy="254" r="8" fill="#E8846B" opacity="0.15"/>
  <circle cx="112" cy="248" r="5" fill="#E8846B" opacity="0.1"/>
  <circle cx="92" cy="260" r="5" fill="#E8846B" opacity="0.1"/>
  <circle cx="100" cy="254" r="6" fill="#E8846B" opacity="0.6"/>
  <text x="100" y="274" font-size="7" fill="#8C8680" text-anchor="middle">hesitate</text>

  <line x1="125" y1="254" x2="165" y2="254" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Ghost paths -->
  <line x1="190" y1="254" x2="220" y2="240" stroke="#E8846B" stroke-width="0.5" opacity="0.15"/>
  <line x1="190" y1="254" x2="220" y2="254" stroke="#E8846B" stroke-width="1" opacity="0.8"/>
  <line x1="190" y1="254" x2="220" y2="268" stroke="#E8846B" stroke-width="0.5" opacity="0.15"/>
  <circle cx="190" cy="254" r="6" fill="#E8846B"/>
  <circle cx="220" cy="240" r="3" fill="#E8846B" opacity="0.15"/>
  <circle cx="220" cy="254" r="4" fill="#E8846B" opacity="0.8"/>
  <circle cx="220" cy="268" r="3" fill="#E8846B" opacity="0.15"/>
  <text x="205" y="274" font-size="7" fill="#8C8680" text-anchor="middle">fork + choose</text>

  <line x1="240" y1="254" x2="280" y2="254" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Resolved -->
  <rect x="295" y="236" width="140" height="36" rx="4" fill="#FDFBF7" stroke="#E8846B" stroke-width="1"/>
  <rect x="295" y="236" width="3" height="36" rx="1.5" fill="#E8846B"/>
  <text x="307" y="250" font-size="7" fill="#8C8680">llm_summarize</text>
  <text x="307" y="263" font-size="8.5" fill="#2C2C2C">model: claude-opus-4-6</text>
  <!-- Decision indicator -->
  <circle cx="426" cy="243" r="3" fill="#E8846B"/>
  <text x="365" y="274" font-size="7" fill="#8C8680" text-anchor="middle">resolved (decision recorded)</text>
</svg>
