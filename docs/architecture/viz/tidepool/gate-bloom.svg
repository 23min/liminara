<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <defs>
    <filter id="w3">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="2" result="turb" seed="11"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1"/>
    </filter>
  </defs>

  <rect width="720" height="200" fill="#F5F0E8"/>

  <text x="24" y="24" font-size="11" fill="#2C2C2C" letter-spacing="0.08em">GATE — THE HUMAN MOMENT</text>
  <text x="24" y="38" font-size="8" fill="#8C8680">A decision that waits for a person. The bloom pauses, half-open.</text>
  <line x1="24" y1="46" x2="696" y2="46" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3"/>

  <!-- Timeline -->
  <line x1="40" y1="110" x2="700" y2="110" stroke="#D4CFC7" stroke-width="0.4"/>

  <!-- Stage 1: Gate opens (half-bloom) -->
  <!-- Outer pulse rings -->
  <circle cx="100" cy="110" r="32" fill="none" stroke="#C45B4A" stroke-width="0.3" opacity="0.15"/>
  <circle cx="100" cy="110" r="24" fill="none" stroke="#C45B4A" stroke-width="0.4" opacity="0.2"/>

  <!-- Half-open card -->
  <rect x="60" y="90" width="80" height="40" rx="3" fill="#FDFBF7" stroke="#C45B4A" stroke-width="0.8" stroke-dasharray="3,2" filter="url(#w3)"/>
  <rect x="60" y="90" width="2" height="40" rx="1" fill="#C45B4A"/>
  <text x="70" y="103" font-size="6" fill="#8C8680">human_review</text>
  <text x="70" y="116" font-size="8" fill="#C45B4A">Approve briefing?</text>
  <text x="70" y="126" font-size="7" fill="#8C8680">waiting...</text>

  <text x="100" y="150" font-size="8" fill="#C45B4A" text-anchor="middle">half-open</text>
  <text x="100" y="162" font-size="7" fill="#8C8680" text-anchor="middle">pulsing, dashed border</text>

  <!-- Arrow -->
  <line x1="160" y1="110" x2="230" y2="110" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- The gap — time passing -->
  <rect x="240" y="96" width="120" height="28" rx="2" fill="none" stroke="#D4CFC7" stroke-width="0.3" stroke-dasharray="2,3"/>
  <text x="300" y="114" font-size="8" fill="#8C8680" text-anchor="middle">12 minutes pass</text>
  <text x="300" y="150" font-size="7" fill="#8C8680" text-anchor="middle">the gap IS the wait</text>
  <text x="300" y="162" font-size="7" fill="#8C8680" text-anchor="middle">(time-proportional spacing)</text>

  <!-- Arrow -->
  <line x1="380" y1="110" x2="430" y2="110" stroke="#D4CFC7" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Stage 2: Gate resolved (full bloom) -->
  <rect x="440" y="78" width="130" height="56" rx="3" fill="#FDFBF7" stroke="#C45B4A" stroke-width="0.8" filter="url(#w3)"/>
  <rect x="440" y="78" width="2.5" height="56" rx="1" fill="#C45B4A"/>
  <!-- Decision dot -->
  <circle cx="562" cy="85" r="3" fill="#C45B4A"/>
  <text x="452" y="91" font-size="6" fill="#8C8680">human_review</text>
  <text x="452" y="104" font-size="8.5" fill="#2C2C2C">Approved</text>
  <text x="452" y="116" font-size="7.5" fill="#8C8680">"Looks good. Add a</text>
  <text x="452" y="127" font-size="7.5" fill="#8C8680"> note about Riksbank"</text>

  <!-- Particles departing -->
  <circle cx="578" cy="104" r="2.5" fill="#C45B4A" opacity="0.6"/>
  <circle cx="592" cy="108" r="2.5" fill="#C45B4A" opacity="0.4"/>
  <circle cx="604" cy="106" r="2.5" fill="#C45B4A" opacity="0.25"/>

  <text x="505" y="150" font-size="8" fill="#2C2C2C" text-anchor="middle">resolved</text>
  <text x="505" y="162" font-size="7" fill="#8C8680" text-anchor="middle">solid border, content visible</text>
  <text x="505" y="174" font-size="7" fill="#8C8680" text-anchor="middle">human voice preserved</text>

  <!-- Annotation: the human's words matter -->
  <line x1="580" y1="94" x2="650" y2="70" stroke="#8C8680" stroke-width="0.3" stroke-dasharray="1,2"/>
  <text x="654" y="68" font-size="7" fill="#8C8680">the person's actual</text>
  <text x="654" y="78" font-size="7" fill="#8C8680">words, not just "approved"</text>
</svg>
